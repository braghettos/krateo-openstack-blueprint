        default: 24220
      service:
        default: 24224
    scheme: http
  identity:
    auth:
      admin:
        default_domain_id: default
        password: password
        project_domain_name: default
        project_name: admin
        region_name: RegionOne
        user_domain_name: default
        username: admin
      test:
        default_domain_id: default
        password: password
        project_domain_name: default
        project_name: test
        region_name: RegionOne
        role: admin
        user_domain_name: default
        username: keystone-test
    host_fqdn_override:
      default: null
    hosts:
      default: keystone
      internal: keystone-api
    name: keystone
    namespace: null
    path:
      default: /v3
      healthcheck: /healthcheck
    port:
