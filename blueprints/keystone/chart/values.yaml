jobs:
  credential_rotate:
    cron: 0 0 1 * *
    group: keystone
    history:
      failed: 1
      success: 3
    migrate_wait: 120
    user: keystone
  credential_setup:
    group: keystone
    user: keystone
  fernet_rotate:
    cron: 0 */12 * * *
    group: keystone
    history:
      failed: 1
      success: 3
    user: keystone
  fernet_setup:
    group: keystone
    user: keystone
