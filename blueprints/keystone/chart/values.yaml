    name: ingress
    namespace: null
    port:
      ingress:
        default: 80
  kube_dns:
    host_fqdn_override:
      default: null
    hosts:
      default: kube-dns
    name: kubernetes-dns
    namespace: kube-system
    path:
      default: null
    port:
      dns:
        default: 53
        protocol: UDP
    scheme: http
  ldap:
    auth:
      client:
        tls:
          ca: null
  local_image_registry:
    host_fqdn_override:
      default: null
    hosts:
      default: localhost
      internal: docker-registry
      node: localhost
    name: docker-registry
    namespace: docker-registry
    port:
      registry:
        node: 5000
  oci_image_registry:
    auth:
      enabled: false
      keystone:
        password: password
        username: keystone
    host_fqdn_override:
      default: null
    hosts:
      default: localhost
    name: oci-image-registry
    namespace: oci-image-registry
    port:
      registry:
        default: null
  oslo_cache:
    host_fqdn_override:
      default: null
    hosts:
      default: memcached
    namespace: null
    port:
      memcache:
        default: 11211
  oslo_db:
    auth:
      admin:
        password: password
        secret:
          tls:
            internal: mariadb-tls-direct
        username: root
      keystone:
        password: password
        username: keystone
    host_fqdn_override:
      default: null
    hosts:
      default: mariadb
    namespace: null
    path: /keystone
    port:
      mysql:
        default: 3306
    scheme: mysql+pymysql
  oslo_messaging:
    auth:
      admin:
        password: password
        secret:
          tls:
            internal: rabbitmq-tls-direct
        username: rabbitmq
      keystone:
        password: password
        username: keystone
    host_fqdn_override:
      default: null
    hosts:
      default: rabbitmq
    namespace: null
    path: /keystone
    port:
      amqp:
        default: 5672
      http:
        default: 15672
    scheme: rabbit
    statefulset:
      name: rabbitmq-rabbitmq
      replicas: 2
