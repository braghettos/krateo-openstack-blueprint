# Full OpenStack-Helm keystone defaults with the blueprint's validated overrides applied
# (2025.1-ubuntu_jammy images, single-replica, Krateo-CDC-friendly). A small curated
# subset is overridable per Composition (see values.schema.json).
bootstrap:
  enabled: true
  ks_user: admin
  script: "# admin needs the admin role for the default domain\nopenstack role add\
    \ \\\n      --user=\"${OS_USERNAME}\" \\\n      --domain=\"${OS_DEFAULT_DOMAIN}\"\
    \ \\\n      \"admin\"\n"
conf:
  access_rules: {}
  keystone:
    DEFAULT:
      log_config_append: /etc/keystone/logging.conf
      max_token_size: 255
    cache:
      backend: dogpile.cache.memcached
      enabled: true
    credential:
      key_repository: /etc/keystone/credential-keys/
    database:
      connection: ''
      max_retries: -1
    fernet_tokens:
      key_repository: /etc/keystone/fernet-keys/
      max_active_keys: 7
    identity:
      domain_config_dir: /etc/keystone/domains
      domain_specific_drivers_enabled: true
    oslo_concurrency:
      lock_path: /var/lock
    oslo_messaging_notifications:
      driver: noop
    oslo_messaging_rabbit:
      rabbit_ha_queues: true
    oslo_middleware:
      enable_proxy_headers_parsing: true
    oslo_policy:
      policy_file: /etc/keystone/policy.yaml
    security_compliance:
      lockout_duration: 1800
      lockout_failure_attempts: 5
    token:
      expiration: 43200
      provider: fernet
  logging:
    formatter_context:
      class: oslo_log.formatters.ContextFormatter
      datefmt: '%Y-%m-%d %H:%M:%S'
    formatter_default:
      datefmt: '%Y-%m-%d %H:%M:%S'
      format: '%(message)s'
    formatters:
      keys:
      - context
      - default
    handler_null:
      args: ()
      class: logging.NullHandler
      formatter: default
    handler_stderr:
      args: (sys.stderr,)
      class: StreamHandler
      formatter: context
    handler_stdout:
      args: (sys.stdout,)
      class: StreamHandler
      formatter: context
    handlers:
      keys:
      - stdout
      - stderr
      - 'null'
    logger_amqp:
      handlers: stderr
      level: WARNING
      qualname: amqp
    logger_amqplib:
      handlers: stderr
      level: WARNING
      qualname: amqplib
    logger_boto:
      handlers: stderr
      level: WARNING
      qualname: boto
    logger_eventletwsgi:
      handlers: stderr
      level: WARNING
      qualname: eventlet.wsgi.server
    logger_keystone:
      handlers:
      - stdout
      level: INFO
      qualname: keystone
    logger_root:
      handlers: 'null'
      level: WARNING
    logger_sqlalchemy:
      handlers: stderr
      level: WARNING
      qualname: sqlalchemy
    loggers:
      keys:
      - root
      - keystone
  mpm_event: "<IfModule mpm_event_module>\n  ServerLimit         1024\n  StartServers\
    \        32\n  MinSpareThreads     32\n  MaxSpareThreads     256\n  ThreadsPerChild\
    \     25\n  MaxRequestsPerChild 128\n  ThreadLimit         720\n</IfModule>\n"
  policy: {}
  rabbitmq:
    policies:
    - apply-to: all
      definition:
        ha-mode: all
        ha-sync-mode: automatic
        message-ttl: 70000
      name: ha_ttl_keystone
      pattern: ^(?!(amq\.|reply_)).*
      priority: 0
      vhost: keystone
  rally_tests:
    run_tempest: false
    tests:
      KeystoneBasic.add_and_remove_user_role:
      - runner:
          concurrency: 1
          times: 1
          type: constant
        sla:
          failure_rate:
            max: 0
      KeystoneBasic.authenticate_user_and_validate_token:
      - args: {}
        runner:
          concurrency: 1
          times: 1
          type: constant
        sla:
          failure_rate:
            max: 0
      KeystoneBasic.create_add_and_list_user_roles:
      - runner:
          concurrency: 1
          times: 1
          type: constant
        sla:
          failure_rate:
            max: 0
      KeystoneBasic.create_and_delete_ec2credential:
      - runner:
          concurrency: 1
          times: 1
          type: constant
        sla:
          failure_rate:
            max: 0
      KeystoneBasic.create_and_delete_role:
      - runner:
          concurrency: 1
          times: 1
          type: constant
        sla:
          failure_rate:
            max: 0
      KeystoneBasic.create_and_delete_service:
      - args:
          description: test_description
          service_type: Rally_test_type
        runner:
          concurrency: 1
          times: 1
          type: constant
        sla:
          failure_rate:
            max: 0
      KeystoneBasic.create_and_get_role:
      - args: {}
        runner:
          concurrency: 1
          times: 1
          type: constant
        sla:
          failure_rate:
            max: 0
      KeystoneBasic.create_and_list_ec2credentials:
      - runner:
          concurrency: 1
          times: 1
          type: constant
        sla:
          failure_rate:
            max: 0
      KeystoneBasic.create_and_list_services:
      - args:
          description: test_description
          service_type: Rally_test_type
        runner:
          concurrency: 1
          times: 1
          type: constant
        sla:
          failure_rate:
            max: 0
      KeystoneBasic.create_and_list_tenants:
      - args: {}
        runner:
          concurrency: 1
          times: 1
          type: constant
        sla:
          failure_rate:
            max: 0
      KeystoneBasic.create_and_list_users:
      - args: {}
        runner:
          concurrency: 1
          times: 1
          type: constant
        sla:
          failure_rate:
            max: 0
      KeystoneBasic.create_delete_user:
      - args: {}
        runner:
          concurrency: 1
          times: 1
          type: constant
        sla:
          failure_rate:
            max: 0
      KeystoneBasic.create_tenant:
      - args: {}
        runner:
          concurrency: 1
          times: 1
          type: constant
        sla:
          failure_rate:
            max: 0
      KeystoneBasic.create_tenant_with_users:
      - args:
          users_per_tenant: 1
        runner:
          concurrency: 1
          times: 1
          type: constant
        sla:
          failure_rate:
            max: 0
      KeystoneBasic.create_update_and_delete_tenant:
      - args: {}
        runner:
          concurrency: 1
          times: 1
          type: constant
        sla:
          failure_rate:
            max: 0
      KeystoneBasic.create_user:
      - args: {}
        runner:
          concurrency: 1
          times: 1
          type: constant
        sla:
          failure_rate:
            max: 0
      KeystoneBasic.create_user_set_enabled_and_delete:
      - args:
          enabled: true
        runner:
          concurrency: 1
          times: 1
          type: constant
        sla:
          failure_rate:
            max: 0
      - args:
          enabled: false
        runner:
          concurrency: 1
          times: 1
          type: constant
        sla:
          failure_rate:
            max: 0
      KeystoneBasic.create_user_update_password:
      - args: {}
        runner:
          concurrency: 1
          times: 1
          type: constant
        sla:
          failure_rate:
            max: 0
      KeystoneBasic.get_entities:
      - runner:
          concurrency: 1
          times: 1
          type: constant
        sla:
          failure_rate:
            max: 0
  security: '#

    # Disable access to the entire file system except for the directories that

    # are explicitly allowed later.

    #

    # This currently breaks the configurations that come with some web application

    # Debian packages.

    #

    #<Directory />

    #   AllowOverride None

    #   Require all denied

    #</Directory>


    # Changing the following options will not really affect the security of the

    # server, but might make attacks slightly more difficult in some cases.


    #

    # ServerTokens

    # This directive configures what you return as the Server HTTP response

    # Header. The default is ''Full'' which sends information about the OS-Type

    # and compiled in modules.

    # Set to one of:  Full | OS | Minimal | Minor | Major | Prod

    # where Full conveys the most information, and Prod the least.

    ServerTokens Prod


    #

    # Optionally add a line containing the server version and virtual host

    # name to server-generated pages (internal error documents, FTP directory

    # listings, mod_status and mod_info output etc., but not CGI generated

    # documents or custom error documents).

    # Set to "EMail" to also include a mailto: link to the ServerAdmin.

    # Set to one of:  On | Off | EMail

    ServerSignature Off


    #

    # Allow TRACE method

    #

    # Set to "extended" to also reflect the request body (only for testing and

    # diagnostic purposes).

    #

    # Set to one of:  On | Off | extended

    TraceEnable Off


    #

    # Forbid access to version control directories

    #

    # If you use version control systems in your document root, you should

    # probably deny access to their directories. For example, for subversion:

    #

    #<DirectoryMatch "/\.svn">

    #   Require all denied

    #</DirectoryMatch>


    #

    # Setting this header will prevent MSIE from interpreting files as something

    # else than declared by the content type in the HTTP headers.

    # Requires mod_headers to be enabled.

    #

    #Header set X-Content-Type-Options: "nosniff"


    #

    # Setting this header will prevent other sites from embedding pages from this

    # site as frames. This defends against clickjacking attacks.

    # Requires mod_headers to be enabled.

    #

    #Header set X-Frame-Options: "sameorigin"

    '
  software:
    apache2:
      a2dismod: null
      a2enmod: null
      binary: apache2
      conf_dir: /etc/apache2/conf-enabled
      mods_dir: /etc/apache2/mods-available
      site_dir: /etc/apache2/sites-enable
      start_parameters: -DFOREGROUND
  sso_callback_template: "<!DOCTYPE html>\n<html xmlns=\"http://www.w3.org/1999/xhtml\"\
    >\n  <head>\n    <title>Keystone WebSSO redirect</title>\n  </head>\n  <body>\n\
    \     <form id=\"sso\" name=\"sso\" action=\"$host\" method=\"post\">\n      \
    \ Please wait...\n       <br/>\n       <input type=\"hidden\" name=\"token\" id=\"\
    token\" value=\"$token\"/>\n       <noscript>\n         <input type=\"submit\"\
    \ name=\"submit_no_javascript\" id=\"submit_no_javascript\"\n            value=\"\
    If your JavaScript is disabled, please click to continue\"/>\n       </noscript>\n\
    \     </form>\n     <script type=\"text/javascript\">\n       window.onload =\
    \ function() {\n         document.forms['sso'].submit();\n       }\n     </script>\n\
    \  </body>\n</html>\n"
  wsgi_keystone: "{{- $portInt := tuple \"identity\" \"service\" \"api\" $ | include\
    \ \"helm-toolkit.endpoints.endpoint_port_lookup\" }}\nListen 0.0.0.0:{{ $portInt\
    \ }}\n\nLogFormat \"%h %l %u %t \\\"%r\\\" %>s %b \\\"%{Referer}i\\\" \\\"%{User-Agent}i\\\
    \"\" combined\nLogFormat \"%{X-Forwarded-For}i %l %u %t \\\"%r\\\" %>s %b \\\"\
    %{Referer}i\\\" \\\"%{User-Agent}i\\\"\" proxy\n\nSetEnvIf X-Forwarded-For \"\
    ^.*\\..*\\..*\\..*\" forwarded\nCustomLog /dev/stdout combined env=!forwarded\n\
    CustomLog /dev/stdout proxy env=forwarded\nErrorLogFormat \"%{cu}t %M\"\nErrorLog\
    \ /dev/stdout\n\n<VirtualHost *:{{ $portInt }}>\n    WSGIDaemonProcess keystone-public\
    \ processes=1 threads=1 user=keystone group=keystone display-name=%{GROUP}\n \
    \   WSGIProcessGroup keystone-public\n    WSGIScriptAlias / /var/www/cgi-bin/keystone/wsgi.py\n\
    \    WSGIApplicationGroup %{GLOBAL}\n    WSGIPassAuthorization On\n    ErrorLogFormat\
    \ \"%{cu}t %M\"\n    ErrorLog /dev/stdout\n\n    SetEnvIf X-Forwarded-For \"^.*\\\
    ..*\\..*\\..*\" forwarded\n    CustomLog /dev/stdout combined env=!forwarded\n\
    \    CustomLog /dev/stdout proxy env=forwarded\n</VirtualHost>\n"
  wsgi_script: "import threading\n\nfrom keystone.server import wsgi\n\napplication\
    \ = None\nlock = threading.Lock()\nwith lock:\n    if application is None:\n \
    \       application = wsgi.initialize_public_application()\n"
dependencies:
  dynamic:
    common:
      local_image_registry:
        jobs:
        - keystone-image-repo-sync
        services:
        - endpoint: node
          service: local_image_registry
    rabbit_init:
      services:
      - endpoint: internal
        service: oslo_messaging
  static:
    api:
      jobs:
      - keystone-db-sync
      - keystone-credential-setup
      - keystone-fernet-setup
      services:
      - endpoint: internal
        service: oslo_cache
      - endpoint: internal
        service: oslo_db
    bootstrap:
      jobs:
      - keystone-domain-manage
      services:
      - endpoint: internal
        service: identity
    credential_cleanup:
      services:
      - endpoint: internal
        service: oslo_db
    credential_rotate:
      jobs:
      - keystone-credential-setup
    credential_setup: null
    db_drop:
      services:
      - endpoint: internal
        service: oslo_db
    db_init:
      services:
      - endpoint: internal
        service: oslo_db
    db_sync:
      jobs:
      - keystone-db-init
      - keystone-credential-setup
      - keystone-fernet-setup
      services:
      - endpoint: internal
        service: oslo_db
    domain_manage:
      services:
      - endpoint: internal
        service: identity
    fernet_rotate:
      jobs:
      - keystone-fernet-setup
    fernet_setup: null
    image_repo_sync:
      services:
      - endpoint: internal
        service: local_image_registry
    tests:
      services:
      - endpoint: internal
        service: identity
endpoints:
  cluster_domain_suffix: cluster.local
  fluentd:
