# Full OpenStack-Helm libvirt defaults with the blueprint's validated overrides applied
# (2025.1-ubuntu_jammy images, single-replica, Krateo-CDC-friendly). A small curated
# subset is overridable per Composition (see values.schema.json).
ceph_client:
  configmap: ceph-etc
  user_secret_name: pvc-ceph-client-key
conf:
  ceph:
    admin_keyring: null
    cinder:
      external_ceph:
        enabled: false
        secret_uuid: null
        user: null
        user_secret_name: null
      keyring: null
      secret_uuid: 457eb676-33da-42ec-9a8c-9293d545c337
      user: cinder
    enabled: false
  dynamic_options:
    libvirt:
      listen_address: 127.0.0.1
      listen_interface: null
    script: "#!/bin/bash\nset -ex\n\nLIBVIRT_CONF_PATH=/tmp/pod-shared/libvirtd.conf\n\
      \n{{- if .Values.conf.dynamic_options.libvirt.listen_interface }}\n\nLISTEN_INTERFACE=\"\
      {{ .Values.conf.dynamic_options.libvirt.listen_interface }}\"\nLISTEN_IP_ADDRESS=$(ip\
      \ address show $LISTEN_INTERFACE | grep 'inet ' | awk '{print $2}' | awk -F\
      \ \"/\" '{print $1}')\n{{- else if .Values.conf.dynamic_options.libvirt.listen_address\
      \ }}\nLISTEN_IP_ADDRESS={{ .Values.conf.dynamic_options.libvirt.listen_address\
      \ }}\n{{- end }}\n\nif [[ -z $LISTEN_IP_ADDRESS ]]; then\n    echo \"LISTEN_IP_ADDRESS\
      \ is not set.\"\n    exit 1\nfi\n\ntee > ${LIBVIRT_CONF_PATH} << EOF\n{{ include\
      \ \"libvirt.utils.to_libvirt_conf\" .Values.conf.libvirt }}\nEOF\n"
  hooks:
    enabled: false
    scripts: null
  init_modules:
    enabled: false
    script: "#!/bin/bash\n\nset -ex\nexport HOME=/tmp\nKVM_QEMU_CONF_HOST=\"/etc/modprobe.d_host/qemu-system-x86.conf\"\
      \n\nif [[ ! -f \"${KVM_QEMU_CONF_HOST}\" ]]; then\n  if grep vmx /proc/cpuinfo;\
      \ then\n    cat << EOF > ${KVM_QEMU_CONF_HOST}\noptions kvm_intel nested=1\n\
      options kvm_intel enable_apicv=1\noptions kvm_intel ept=1\nEOF\n    modprobe\
      \ -r kvm_intel || true\n    modprobe kvm_intel nested=1\n  elif grep svm /proc/cpuinfo;\
      \ then\n    cat << EOF > ${KVM_QEMU_CONF_HOST}\noptions kvm_amd nested=1\nEOF\n\
      \    modprobe -r kvm_amd || true\n    modprobe kvm_amd nested=1\n  else\n  \
      \  echo \"Nested virtualization is not supported\"\n  fi\nfi\n"
  kubernetes:
    cgroup: kubepods.slice
    cgroup_controllers:
    - blkio
    - cpu
    - devices
    - freezer
    - hugetlb
    - memory
    - net_cls
    - perf_event
    - rdma
    - misc
    - pids
  libvirt:
    auth_tcp: none
    auth_unix_rw: none
    ca_file: /etc/pki/CA/cacert.pem
    cert_file: /etc/pki/libvirt/servercert.pem
    key_file: /etc/pki/libvirt/private/serverkey.pem
    listen_addr: ${LISTEN_IP_ADDRESS}
    listen_tcp: '1'
    listen_tls: '0'
    log_level: '3'
    log_outputs: 1:file:/var/log/libvirt/libvirtd.log
    virt_type: qemu
  qemu:
    group: kvm
    stdio_handler: file
    user: nova
    vnc_tls: '0'
    vnc_tls_x509_verify: '0'
  vencrypt:
    cert_init_sh: "#!/bin/bash\nset -x\n\nHOSTNAME_FQDN=$(hostname --fqdn)\n\n# Script\
      \ to create certs for each libvirt pod based on pod IP (by default).\ncat <<EOF\
      \ | kubectl apply -f -\napiVersion: cert-manager.io/v1\nkind: Certificate\n\
      metadata:\n  name: ${POD_NAME}-${TYPE}\n  namespace: ${POD_NAMESPACE}\n  ownerReferences:\n\
      \    - apiVersion: v1\n      kind: Pod\n      name: ${POD_NAME}\n      uid:\
      \ ${POD_UID}\nspec:\n  secretName: ${POD_NAME}-${TYPE}\n  commonName: ${POD_IP}\n\
      \  usages:\n  - client auth\n  - server auth\n  dnsNames:\n  - ${HOSTNAME}\n\
      \  - ${HOSTNAME_FQDN}\n  ipAddresses:\n  - ${POD_IP}\n  issuerRef:\n    kind:\
      \ ${ISSUER_KIND}\n    name: ${ISSUER_NAME}\nEOF\n\nkubectl -n ${POD_NAMESPACE}\
      \ wait --for=condition=Ready --timeout=300s \\\n  certificate/${POD_NAME}-${TYPE}\n\
      \n# NOTE(mnaser): cert-manager does not clean-up the secrets when the certificate\n\
      #               is deleted, so we should add an owner reference to the secret\n\
      #               to ensure that it is cleaned up when the pod is deleted.\nkubectl\
      \ -n ${POD_NAMESPACE} patch secret ${POD_NAME}-${TYPE} \\\n  --type=json -p='[{\"\
      op\": \"add\", \"path\": \"/metadata/ownerReferences\", \"value\": [{\"apiVersion\"\
      : \"v1\", \"kind\": \"Pod\", \"name\": \"'${POD_NAME}'\", \"uid\": \"'${POD_UID}'\"\
      }]}]'\n\nkubectl -n ${POD_NAMESPACE} get secret ${POD_NAME}-${TYPE} -o jsonpath='{.data.tls\\\
      .crt}' | base64 -d > /tmp/${TYPE}.crt\nkubectl -n ${POD_NAMESPACE} get secret\
      \ ${POD_NAME}-${TYPE} -o jsonpath='{.data.tls\\.key}' | base64 -d > /tmp/${TYPE}.key\n\
      kubectl -n ${POD_NAMESPACE} get secret ${POD_NAME}-${TYPE} -o jsonpath='{.data.ca\\\
      .crt}' | base64 -d > /tmp/${TYPE}-ca.crt\n"
    issuer:
      kind: ClusterIssuer
      name: ca-clusterissuer
dependencies:
  dynamic:
    common:
      local_image_registry:
        jobs:
        - libvirt-image-repo-sync
        services:
        - endpoint: node
          service: local_image_registry
    targeted:
      openvswitch:
        libvirt:
          pod:
          - labels:
              application: neutron
              component: neutron-ovs-agent
            requireSameNode: true
      ovn:
        libvirt:
          pod:
          - labels:
              application: ovn
              component: ovn-controller
            requireSameNode: true
      sriov:
        libvirt:
          pod:
          - labels:
              application: neutron
              component: neutron-sriov-agent
            requireSameNode: true
  static:
    image_repo_sync:
      services:
      - endpoint: internal
        service: local_image_registry
    libvirt:
      services: null
endpoints:
  cluster_domain_suffix: cluster.local
  local_image_registry:
    host_fqdn_override:
      default: null
    hosts:
      default: localhost
      internal: docker-registry
      node: localhost
    name: docker-registry
    namespace: docker-registry
    port:
      registry:
        node: 5000
  oci_image_registry:
    auth:
      enabled: false
      libvirt:
        password: password
        username: libvirt
    host_fqdn_override:
      default: null
    hosts:
      default: localhost
    name: oci-image-registry
    namespace: oci-image-registry
    port:
      registry:
        default: null
extraObjects: []
images:
  local_registry:
    active: false
    exclude:
    - dep_check
    - image_repo_sync
  pull_policy: IfNotPresent
  tags:
    ceph_config_helper: quay.io/airshipit/ceph-config-helper:ubuntu_jammy_20.2.1-1-20260407
    dep_check: quay.io/airshipit/kubernetes-entrypoint:latest-ubuntu_noble
    image_repo_sync: quay.io/airshipit/docker:27.5.0
    kubectl: docker.io/bitnami/kubectl:latest
    libvirt: quay.io/airshipit/libvirt:2025.1-ubuntu_noble
labels:
  agent:
    libvirt:
      node_selector_key: openstack-compute-node
      node_selector_value: enabled
libvirt:
  extraContainers: []
manifests:
  configmap_bin: true
  configmap_etc: true
  daemonset_libvirt: true
  job_image_repo_sync: true
  network_policy: false
  role_cert_manager: false
  secret_registry: true
network:
  backend:
  - openvswitch
network_policy:
  libvirt:
    egress:
    - {}
    ingress:
    - {}
pod:
  affinity:
    anti:
      topologyKey:
        default: kubernetes.io/hostname
      type:
        default: preferredDuringSchedulingIgnoredDuringExecution
      weight:
        default: 10
  dns_policy: ClusterFirstWithHostNet
  lifecycle:
    upgrades:
      daemonsets:
        libvirt:
          enabled: true
          max_unavailable: 1
          min_ready_seconds: 0
        pod_replacement_strategy: RollingUpdate
  mounts:
    libvirt:
      init_container: null
      libvirt: null
  probes:
    libvirt:
      libvirt:
        liveness:
          enabled: true
          params:
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 5
        readiness:
          enabled: true
          params:
            initialDelaySeconds: 15
            periodSeconds: 60
            timeoutSeconds: 5
  resources:
    enabled: false
    jobs:
      image_repo_sync:
        limits:
          cpu: 2000m
          memory: 1024Mi
        requests:
          cpu: 100m
          memory: 128Mi
    libvirt:
      limits:
        cpu: 2000m
        memory: 1024Mi
      requests:
        cpu: 100m
        memory: 128Mi
  security_context:
    libvirt:
      container:
        ceph_admin_keyring_placement:
          readOnlyRootFilesystem: false
        ceph_keyring_placement:
          readOnlyRootFilesystem: false
        init_dynamic_options:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65534
        libvirt:
          privileged: true
          readOnlyRootFilesystem: false
        libvirt_init_modules:
          capabilities:
            drop:
            - ALL
          privileged: true
          readOnlyRootFilesystem: true
      pod:
        runAsUser: 0
  tolerations:
    libvirt:
      enabled: false
      tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/master
        operator: Exists
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
        operator: Exists
release_group: null
secrets:
  oci_image_registry:
    libvirt: libvirt-oci-image-registry-key
  tls:
    client: libvirt-tls-client
    server: libvirt-tls-server
