  rally_tests:
    clean_up: "# NOTE: We will make the best effort to clean up rally generated networks\
      \ and routers,\n# but should not block further automated deployment.\nset +e\n\
      PATTERN=\"^[sc]_rally_\"\n\nROUTERS=$(openstack router list --format=value -c\
      \ Name | grep -e $PATTERN | sort | tr -d '\\r')\nNETWORKS=$(openstack network\
      \ list --format=value -c Name | grep -e $PATTERN | sort | tr -d '\\r')\n\nfor\
      \ ROUTER in $ROUTERS\ndo\n  openstack router unset --external-gateway $ROUTER\n\
      \  openstack router set --disable --no-ha $ROUTER\n\n  SUBNS=$(openstack router\
      \ show $ROUTER -c interfaces_info --format=value | python -m json.tool | grep\
      \ -oP '(?<=\"subnet_id\": \")[a-f0-9\\-]{36}(?=\")' | sort | uniq)\n  for SUBN\
      \ in $SUBNS\n  do\n    openstack router remove subnet $ROUTER $SUBN\n  done\n\
      \n  for PORT in $(openstack port list --router $ROUTER --format=value -c ID\
      \ | tr -d '\\r')\n  do\n    openstack router remove port $ROUTER $PORT\n  done\n\
      \n  openstack router delete $ROUTER\ndone\n\nfor NETWORK in $NETWORKS\ndo\n\
      \  for PORT in $(openstack port list --network $NETWORK --format=value -c ID\
      \ | tr -d '\\r')\n  do\n    openstack port delete $PORT\n  done\n  openstack\
      \ network delete $NETWORK\ndone\nset -e\n"
    run_tempest: false
    tests:
