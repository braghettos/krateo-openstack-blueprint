bootstrap:
  enabled: false
  ks_user: neutron
  script: 'openstack token issue

    '
conf:
  api_audit_map:
    DEFAULT:
      target_endpoint_type: None
    custom_actions:
      add_router_interface: update/add
      remove_router_interface: update/remove
    path_keywords:
      floatingips: ip
      health_monitors: health_monitor
      healthmonitors: healthmonitor
      members: member
      metering-label-rules: rule
      metering-labels: label
      networks: network
      pools: pool
      ports: port
      quotas: quota
      routers: router
      security-group-rules: rule
      security-groups: security-group
      subnets: subnet
      vips: vip
    service_endpoints:
      network: service/network
  auto_bridge_add:
    br-ex: null
  bagpipe_bgp: {}
  bgp_dragent: {}
  dhcp_agent:
    DEFAULT:
      dnsmasq_config_file: /etc/neutron/dnsmasq.conf
      force_metadata: true
      interface_driver: null
    ovs: {}
  dnsmasq: '#no-hosts

    #port=5353

    #cache-size=500

    #no-negcache

    #dns-forward-max=100

    #resolve-file=

    #strict-order

    #bind-interface

    #bind-dynamic

    #domain=

    #dhcp-range=10.10.10.10,10.10.10.100,24h

    #dhcp-lease-max=150

    #dhcp-host=11:22:33:44:55:66,ignore

    #dhcp-option=3,10.10.10.1

    #dhcp-option-force=26,1450

    '
  l3_agent:
    DEFAULT:
      agent_mode: legacy
      interface_driver: null
  logging:
    formatter_context:
      class: oslo_log.formatters.ContextFormatter
      datefmt: '%Y-%m-%d %H:%M:%S'
    formatter_default:
      datefmt: '%Y-%m-%d %H:%M:%S'
      format: '%(message)s'
    formatters:
      keys:
      - context
      - default
    handler_null:
      args: ()
      class: logging.NullHandler
      formatter: default
    handler_stderr:
      args: (sys.stderr,)
      class: StreamHandler
      formatter: context
    handler_stdout:
      args: (sys.stdout,)
      class: StreamHandler
      formatter: context
    handlers:
      keys:
      - stdout
      - stderr
      - 'null'
    logger_amqp:
      handlers: stderr
      level: WARNING
      qualname: amqp
    logger_amqplib:
      handlers: stderr
      level: WARNING
      qualname: amqplib
    logger_boto:
      handlers: stderr
      level: WARNING
      qualname: boto
    logger_eventletwsgi:
      handlers: stderr
      level: WARNING
      qualname: eventlet.wsgi.server
    logger_neutron:
      handlers:
      - stdout
      level: INFO
      qualname: neutron
    logger_neutron_taas:
      handlers:
      - stdout
      level: INFO
      qualname: neutron_taas
    logger_root:
      handlers: 'null'
      level: WARNING
    logger_sqlalchemy:
      handlers: stderr
      level: WARNING
      qualname: sqlalchemy
    loggers:
      keys:
      - root
      - neutron
      - neutron_taas
  metadata_agent:
    DEFAULT:
      log_config_append: /etc/neutron/logging.conf
      metadata_proxy_shared_secret: password
      metadata_proxy_socket: /var/lib/neutron/openstack-helm/metadata_proxy
    cache:
      backend: dogpile.cache.memcached
      enabled: true
  metering_agent: null
  netoffload:
    asap2: null
    enabled: false
  neutron:
    DEFAULT:
      allow_automatic_l3agent_failover: true
      allow_overlapping_ips: true
      api_workers: 1
      bind_port: null
      core_plugin: ml2
      default_availability_zones: nova
      dhcp_agents_per_network: 1
      interface_driver: null
      l3_ha: false
      l3_ha_network_type: vxlan
      log_config_append: /etc/neutron/logging.conf
      max_l3_agents_per_router: 2
      metadata_proxy_socket: /var/lib/neutron/openstack-helm/metadata_proxy
      network_auto_schedule: true
      router_auto_schedule: true
      rpc_workers: 4
      service_plugins: router
      state_path: /var/lib/neutron
    agent:
      root_helper: sudo /var/lib/openstack/bin/neutron-rootwrap /etc/neutron/rootwrap.conf
      root_helper_daemon: sudo /var/lib/openstack/bin/neutron-rootwrap-daemon /etc/neutron/rootwrap.conf
    database:
      connection: ''
      max_retries: -1
    designate:
      allow_reverse_dns_lookup: true
      auth_type: password
      auth_version: v3
      endpoint_type: internal
    ironic:
      auth_type: password
      auth_version: v3
      endpoint_type: internal
    keystone_authtoken:
      auth_type: password
      auth_version: v3
      memcache_security_strategy: ENCRYPT
      service_token_roles: service
      service_token_roles_required: true
      service_type: network
    nova:
      auth_type: password
      auth_version: v3
      endpoint_type: internal
    octavia:
      request_poll_timeout: 3000
    oslo_concurrency:
      lock_path: /var/lock
    oslo_messaging_notifications:
      driver: messagingv2
    oslo_messaging_rabbit:
      rabbit_ha_queues: true
    oslo_middleware:
      enable_proxy_headers_parsing: true
    oslo_policy:
      policy_file: /etc/neutron/policy.yaml
    ovn:
      ovn_metadata_enabled: true
    placement:
      auth_type: password
      auth_version: v3
      endpoint_type: internal
  neutron_api_uwsgi:
    uwsgi:
      add-header: 'Connection: close'
      buffer-size: 65535
      die-on-term: true
      enable-threads: true
      exit-on-reload: false
      hook-master-start: unix_signal:15 gracefully_kill_them_all
      lazy-apps: true
      log-x-forwarded-for: true
      master: true
      module: neutron.wsgi.api:application
      procname-prefix-spaced: 'neutron-api:'
      route-user-agent: '^kube-probe.* donotlog:'
      start-time: '%t'
      stats: 0.0.0.0:1717
      stats-http: true
      thunder-lock: true
      worker-reload-mercy: 80
  neutron_sudoers: '# This sudoers file supports rootwrap for both Kolla and LOCI
    Images.

    Defaults !requiretty

    Defaults secure_path="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/snap/bin:/var/lib/openstack/bin:/var/lib/kolla/venv/bin"

    neutron ALL = (root) NOPASSWD: /var/lib/kolla/venv/bin/neutron-rootwrap /etc/neutron/rootwrap.conf
    *, /var/lib/openstack/bin/neutron-rootwrap /etc/neutron/rootwrap.conf *

    neutron ALL = (root) NOPASSWD: /var/lib/kolla/venv/bin/neutron-rootwrap-daemon
    /etc/neutron/rootwrap.conf, /var/lib/openstack/bin/neutron-rootwrap-daemon /etc/neutron/rootwrap.conf

    '
  neutron_vpnaas: null
  ovn_agent:
    DEFAULT:
      metadata_proxy_shared_secret: password
      metadata_proxy_socket: /var/lib/neutron/openstack-helm/metadata_proxy
      metadata_workers: 2
    agent:
      extensions: metadata
    cache:
      backend: dogpile.cache.memcached
      enabled: true
    ovs:
      ovsdb_connection: unix:/run/openvswitch/db.sock
  ovn_metadata_agent:
    DEFAULT:
      metadata_proxy_shared_secret: password
      metadata_proxy_socket: /var/lib/neutron/openstack-helm/metadata_proxy
      metadata_workers: 2
    cache:
      backend: dogpile.cache.memcached
      enabled: true
    ovs:
      ovsdb_connection: unix:/run/openvswitch/db.sock
  ovn_metadata_agent_init:
    chown_ovsdb_sock: true
  ovn_vpn_agent:
    DEFAULT:
      interface_driver: openvswitch
    ovs:
      ovsdb_connection: unix:/run/openvswitch/db.sock
    vpnagent:
      vpn_device_driver: neutron_vpnaas.services.vpn.device_drivers.ovn_ipsec.OvnStrongSwanDriver
  ovs_dpdk:
    bridges:
    - name: br-phy
    driver: uio_pci_generic
    enabled: false
    nics:
    - bridge: br-phy
      migrate_ip: true
      n_rxq: 2
      n_txq: 2
      name: dpdk0
      ofport_request: 1
      pci_id: '0000:05:00.0'
      pmd_rxq_affinity: 0:3,1:27
    update_dpdk_bond_config: true
  paste:
    app:neutronapiapp_v2_0:
      paste.app_factory: neutron.api.v2.router:APIRouter.factory
    app:neutronversions:
      paste.app_factory: neutron.pecan_wsgi.app:versions_factory
    composite:neutron:
      /: neutronversions_composite
      /v2.0: neutronapi_v2_0
      use: egg:Paste#urlmap
    composite:neutronapi_v2_0:
      keystone: cors http_proxy_to_wsgi request_id catch_errors authtoken audit keystonecontext
        extensions neutronapiapp_v2_0
      noauth: cors http_proxy_to_wsgi request_id catch_errors extensions neutronapiapp_v2_0
      use: call:neutron.auth:pipeline_factory
    composite:neutronversions_composite:
      keystone: cors http_proxy_to_wsgi neutronversions
      noauth: cors http_proxy_to_wsgi neutronversions
      use: call:neutron.auth:pipeline_factory
    filter:audit:
      audit_map_file: /etc/neutron/api_audit_map.conf
      paste.filter_factory: keystonemiddleware.audit:filter_factory
    filter:authtoken:
      paste.filter_factory: keystonemiddleware.auth_token:filter_factory
    filter:catch_errors:
      paste.filter_factory: oslo_middleware:CatchErrors.factory
    filter:cors:
      oslo_config_project: neutron
      paste.filter_factory: oslo_middleware.cors:filter_factory
    filter:extensions:
      paste.filter_factory: neutron.api.extensions:plugin_aware_extension_middleware_factory
    filter:http_proxy_to_wsgi:
      paste.filter_factory: oslo_middleware.http_proxy_to_wsgi:HTTPProxyToWSGI.factory
    filter:keystonecontext:
      paste.filter_factory: neutron.auth:NeutronKeystoneContext.factory
    filter:osprofiler:
      paste.filter_factory: osprofiler.web:WsgiMiddleware.factory
    filter:request_id:
      paste.filter_factory: oslo_middleware:RequestId.factory
