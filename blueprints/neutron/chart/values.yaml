  rootwrap: '# Configuration for neutron-rootwrap

    # This file should be owned by (and only-writeable by) the root user


    [DEFAULT]

    # List of directories to load filter definitions from (separated by '','').

    # These directories MUST all be only writeable by root !

    filters_path=/etc/neutron/rootwrap.d,/usr/share/neutron/rootwrap,/var/lib/openstack/etc/neutron/rootwrap.d


    # List of directories to search executables in, in case filters do not

    # explicitely specify a full path (separated by '','')

    # If not specified, defaults to system PATH environment variable.

    # These directories MUST all be only writeable by root !

    exec_dirs=/sbin,/usr/sbin,/bin,/usr/bin,/usr/local/bin,/usr/local/sbin,/var/lib/openstack/bin,/var/lib/kolla/venv/bin


    # Enable logging to syslog

    # Default value is False

    use_syslog=False


    # Which syslog facility to use.

    # Valid values include auth, authpriv, syslog, local0, local1...

    # Default value is ''syslog''

    syslog_log_facility=syslog


    # Which messages to log.

    # INFO means log all usage

    # ERROR means only log unsuccessful attempts

    syslog_log_level=ERROR

    '
  rootwrap_filters:
    debug:
      content: '# neutron-rootwrap command filters for nodes on which neutron is

        # expected to control network

        #

        # This file should be owned by (and only-writeable by) the root user


        # format seems to be

        # cmd-name: filter-name, raw-command, user, args


        [Filters]


        # This is needed because we should ping

        # from inside a namespace which requires root

        # _alt variants allow to match -c and -w in any order

        #   (used by NeutronDebugAgent.ping_all)

        ping: RegExpFilter, ping, root, ping, -w, \d+, -c, \d+, [0-9\.]+

        ping_alt: RegExpFilter, ping, root, ping, -c, \d+, -w, \d+, [0-9\.]+

        ping6: RegExpFilter, ping6, root, ping6, -w, \d+, -c, \d+, [0-9A-Fa-f:]+

        ping6_alt: RegExpFilter, ping6, root, ping6, -c, \d+, -w, \d+, [0-9A-Fa-f:]+

        '
      pods:
      - dhcp_agent
      - l3_agent
      - metadata_agent
      - ovn_metadata_agent
      - ovn_vpn_agent
      - ovs_agent
      - sriov_agent
    dhcp:
      content: '# neutron-rootwrap command filters for nodes on which neutron is

        # expected to control network

        #

        # This file should be owned by (and only-writeable by) the root user


        # format seems to be

        # cmd-name: filter-name, raw-command, user, args


        [Filters]


        # dhcp-agent

        dnsmasq: CommandFilter, dnsmasq, root

        # dhcp-agent uses kill as well, that''s handled by the generic KillFilter

        # it looks like these are the only signals needed, per

        # neutron/agent/linux/dhcp.py

        kill_dnsmasq: KillFilter, root, /sbin/dnsmasq, -9, -HUP, -15

        kill_dnsmasq_usr: KillFilter, root, /usr/sbin/dnsmasq, -9, -HUP, -15


        ovs-vsctl: CommandFilter, ovs-vsctl, root

        ivs-ctl: CommandFilter, ivs-ctl, root

        mm-ctl: CommandFilter, mm-ctl, root

        dhcp_release: CommandFilter, dhcp_release, root

        dhcp_release6: CommandFilter, dhcp_release6, root


        # metadata proxy

        metadata_proxy: CommandFilter, neutron-ns-metadata-proxy, root

        # RHEL invocation of the metadata proxy will report /usr/bin/python

        kill_metadata: KillFilter, root, python, -9

        kill_metadata2: KillFilter, root, python2, -9

        kill_metadata7: KillFilter, root, python2.7, -9

        kill_metadata3: KillFilter, root, python3, -9

        kill_metadata35: KillFilter, root, python3.5, -9

        kill_metadata36: KillFilter, root, python3.6, -9

        kill_metadata37: KillFilter, root, python3.7, -9


        # ip_lib

        ip: IpFilter, ip, root

        find: RegExpFilter, find, root, find, /sys/class/net, -maxdepth, 1, -type,
        l, -printf, %.*

        ip_exec: IpNetnsExecFilter, ip, root

        '
      pods:
      - dhcp_agent
      - l3_agent
      - metadata_agent
      - ovn_metadata_agent
      - ovn_vpn_agent
      - ovs_agent
      - sriov_agent
      - netns_cleanup_cron
    dibbler:
      content: '# neutron-rootwrap command filters for nodes on which neutron is

        # expected to control network

        #

        # This file should be owned by (and only-writeable by) the root user


        # format seems to be

        # cmd-name: filter-name, raw-command, user, args


        [Filters]


        # Filters for the dibbler-based reference implementation of the pluggable

        # Prefix Delegation driver. Other implementations using an alternative agent

        # should include a similar filter in this folder.


        # prefix_delegation_agent

        dibbler-client: CommandFilter, dibbler-client, root

        '
      pods:
      - dhcp_agent
      - l3_agent
      - metadata_agent
      - ovn_agent
      - ovn_metadata_agent
      - ovn_vpn_agent
      - ovs_agent
      - sriov_agent
    ebtables:
      content: '# neutron-rootwrap command filters for nodes on which neutron is

        # expected to control network

        #

        # This file should be owned by (and only-writeable by) the root user


        # format seems to be

        # cmd-name: filter-name, raw-command, user, args


        [Filters]


        ebtables: CommandFilter, ebtables, root

        '
      pods:
      - dhcp_agent
      - l3_agent
      - metadata_agent
      - ovn_metadata_agent
      - ovn_vpn_agent
      - ovs_agent
      - sriov_agent
    ipset_firewall:
      content: '# neutron-rootwrap command filters for nodes on which neutron is

        # expected to control network

        #

        # This file should be owned by (and only-writeable by) the root user


        # format seems to be

        # cmd-name: filter-name, raw-command, user, args


        [Filters]

        # neutron/agent/linux/iptables_firewall.py

        #   "ipset", "-A", ...

        ipset: CommandFilter, ipset, root

        '
      pods:
      - dhcp_agent
      - l3_agent
      - metadata_agent
      - ovn_metadata_agent
      - ovn_vpn_agent
      - ovs_agent
      - sriov_agent
    iptables_firewall:
      content: '# neutron-rootwrap command filters for nodes on which neutron is

        # expected to control network

        #

        # This file should be owned by (and only-writeable by) the root user


        # format seems to be

        # cmd-name: filter-name, raw-command, user, args


        [Filters]


        # neutron/agent/linux/iptables_firewall.py

        #   "iptables-save", ...

        iptables-save: CommandFilter, iptables-save, root

        iptables-restore: CommandFilter, iptables-restore, root

        ip6tables-save: CommandFilter, ip6tables-save, root

        ip6tables-restore: CommandFilter, ip6tables-restore, root


        # neutron/agent/linux/iptables_firewall.py

        #   "iptables", "-A", ...

        iptables: CommandFilter, iptables, root

        ip6tables: CommandFilter, ip6tables, root


        # neutron/agent/linux/iptables_firewall.py

        sysctl: CommandFilter, sysctl, root


        # neutron/agent/linux/ip_conntrack.py

        conntrack: CommandFilter, conntrack, root

        '
      pods:
      - dhcp_agent
      - l3_agent
      - metadata_agent
      - ovn_agent
      - ovn_metadata_agent
      - ovn_vpn_agent
      - ovs_agent
      - sriov_agent
    l3:
      content: '# neutron-rootwrap command filters for nodes on which neutron is

        # expected to control network

        #

        # This file should be owned by (and only-writeable by) the root user


        # format seems to be

        # cmd-name: filter-name, raw-command, user, args


        [Filters]


        # arping

        arping: CommandFilter, arping, root


        # l3_agent

        sysctl: CommandFilter, sysctl, root

        route: CommandFilter, route, root

        radvd: CommandFilter, radvd, root


        # haproxy

        haproxy: RegExpFilter, haproxy, root, haproxy, -f, .*

        kill_haproxy: KillFilter, root, haproxy, -15, -9, -HUP


        # metadata proxy

        metadata_proxy: CommandFilter, neutron-ns-metadata-proxy, root

        # RHEL invocation of the metadata proxy will report /usr/bin/python

        kill_metadata: KillFilter, root, python, -15, -9

        kill_metadata2: KillFilter, root, python2, -15, -9

        kill_metadata7: KillFilter, root, python2.7, -15, -9

        kill_metadata3: KillFilter, root, python3, -15, -9

        kill_metadata35: KillFilter, root, python3.5, -15, -9

        kill_metadata36: KillFilter, root, python3.6, -15, -9

        kill_metadata37: KillFilter, root, python3.7, -15, -9

        kill_radvd_usr: KillFilter, root, /usr/sbin/radvd, -15, -9, -HUP

        kill_radvd: KillFilter, root, /sbin/radvd, -15, -9, -HUP


        # ip_lib

        ip: IpFilter, ip, root

        find: RegExpFilter, find, root, find, /sys/class/net, -maxdepth, 1, -type,
        l, -printf, %.*

        ip_exec: IpNetnsExecFilter, ip, root


        # l3_tc_lib

        l3_tc_show_qdisc: RegExpFilter, tc, root, tc, qdisc, show, dev, .+

        l3_tc_add_qdisc_ingress: RegExpFilter, tc, root, tc, qdisc, add, dev, .+,
        ingress

        l3_tc_add_qdisc_egress: RegExpFilter, tc, root, tc, qdisc, add, dev, .+, root,
        handle, 1:, htb

        l3_tc_show_filters: RegExpFilter, tc, root, tc, -p, -s, -d, filter, show,
        dev, .+, parent, .+, prio, 1

        l3_tc_delete_filters: RegExpFilter, tc, root, tc, filter, del, dev, .+, parent,
        .+, prio, 1, handle, .+, u32

        l3_tc_add_filter_ingress: RegExpFilter, tc, root, tc, filter, add, dev, .+,
        parent, .+, protocol, ip, prio, 1, u32, match, ip, dst, .+, police, rate,
        .+, burst, .+, drop, flowid, :1

        l3_tc_add_filter_egress:  RegExpFilter, tc, root, tc, filter, add, dev, .+,
        parent, .+, protocol, ip, prio, 1, u32, match, ip, src, .+, police, rate,
        .+, burst, .+, drop, flowid, :1


        # For ip monitor

        kill_ip_monitor: KillFilter, root, ip, -9


        # ovs_lib (if OVSInterfaceDriver is used)

        ovs-vsctl: CommandFilter, ovs-vsctl, root


        # iptables_manager

        iptables-save: CommandFilter, iptables-save, root

        iptables-restore: CommandFilter, iptables-restore, root

        ip6tables-save: CommandFilter, ip6tables-save, root

        ip6tables-restore: CommandFilter, ip6tables-restore, root


        # Keepalived

        keepalived: CommandFilter, keepalived, root

        kill_keepalived: KillFilter, root, keepalived, -HUP, -15, -9


        # l3 agent to delete floatingip''s conntrack state

        conntrack: CommandFilter, conntrack, root


        # keepalived state change monitor

        keepalived_state_change: CommandFilter, neutron-keepalived-state-change, root

        # The following filters are used to kill the keepalived state change monitor.

        # Since the monitor runs as a Python script, the system reports that the

        # command of the process to be killed is python.

        # TODO(mlavalle) These kill filters will be updated once we come up with a

        # mechanism to kill using the name of the script being executed by Python

        kill_keepalived_monitor_py: KillFilter, root, python, -15

        kill_keepalived_monitor_py27: KillFilter, root, python2.7, -15

        kill_keepalived_monitor_py3: KillFilter, root, python3, -15

        kill_keepalived_monitor_py35: KillFilter, root, python3.5, -15

        kill_keepalived_monitor_py36: KillFilter, root, python3.6, -15

        kill_keepalived_monitor_py37: KillFilter, root, python3.7, -15

        '
      pods:
      - dhcp_agent
      - l3_agent
      - metadata_agent
      - ovn_agent
      - ovn_metadata_agent
      - ovn_vpn_agent
      - ovs_agent
      - sriov_agent
    linux_vxlan:
      content: '# bagpipe-bgp-rootwrap command filters for nodes on which bagpipe-bgp
        is

        # expected to control VXLAN Linux Bridge dataplane

        #

        # This file should be owned by (and only-writeable by) the root user


        # format seems to be

        # cmd-name: filter-name, raw-command, user, args


        [Filters]


        #

        modprobe: CommandFilter, modprobe, root


        #

        brctl: CommandFilter, brctl, root

        bridge: CommandFilter, bridge, root


        # ip_lib

        ip: IpFilter, ip, root

        ip_exec: IpNetnsExecFilter, ip, root


        # shell (for piped commands)

        sh: CommandFilter, sh, root

        '
      pods:
      - bagpipe_bgp
    mpls_ovs_dataplane:
      content: '# bagpipe-bgp-rootwrap command filters for nodes on which bagpipe-bgp
        is

        # expected to control MPLS OpenVSwitch dataplane

        #

        # This file should be owned by (and only-writeable by) the root user


        # format seems to be

        # cmd-name: filter-name, raw-command, user, args


        [Filters]


        # openvswitch

        ovs-vsctl: CommandFilter, ovs-vsctl, root

        ovs-ofctl: CommandFilter, ovs-ofctl, root


        # ip_lib

        ip: IpFilter, ip, root

        ip_exec: IpNetnsExecFilter, ip, root


        # shell (for piped commands)

        sh: CommandFilter, sh, root

        '
      pods:
      - bagpipe_bgp
    netns_cleanup:
      content: '# neutron-rootwrap command filters for nodes on which neutron is

        # expected to control network

        #

        # This file should be owned by (and only-writeable by) the root user


        # format seems to be

        # cmd-name: filter-name, raw-command, user, args


        [Filters]


        # netns-cleanup

        netstat: CommandFilter, netstat, root

        '
      pods:
      - dhcp_agent
      - l3_agent
      - metadata_agent
      - ovn_agent
      - ovn_metadata_agent
      - ovn_vpn_agent
      - ovs_agent
      - sriov_agent
      - netns_cleanup_cron
    openvswitch_plugin:
      content: '# neutron-rootwrap command filters for nodes on which neutron is

        # expected to control network

        #

        # This file should be owned by (and only-writeable by) the root user


        # format seems to be

        # cmd-name: filter-name, raw-command, user, args


        [Filters]


        # openvswitch-agent

        # unclear whether both variants are necessary, but I''m transliterating

        # from the old mechanism

        ovs-vsctl: CommandFilter, ovs-vsctl, root

        # NOTE(yamamoto): of_interface=native doesn''t use ovs-ofctl

        ovs-ofctl: CommandFilter, ovs-ofctl, root

        ovs-appctl: CommandFilter, ovs-appctl, root

        kill_ovsdb_client: KillFilter, root, /usr/bin/ovsdb-client, -9

        ovsdb-client: CommandFilter, ovsdb-client, root

        xe: CommandFilter, xe, root


        # ip_lib

        ip: IpFilter, ip, root

        find: RegExpFilter, find, root, find, /sys/class/net, -maxdepth, 1, -type,
        l, -printf, %.*

        ip_exec: IpNetnsExecFilter, ip, root


        # needed for FDB extension

        bridge: CommandFilter, bridge, root

        '
      pods:
      - dhcp_agent
      - l3_agent
      - metadata_agent
      - ovn_metadata_agent
      - ovn_vpn_agent
      - ovs_agent
      - sriov_agent
    privsep:
      content: "# Command filters to allow privsep daemon to be started via rootwrap.\n\
        #\n# This file should be owned by (and only-writeable by) the root user\n\n\
        [Filters]\n\n# By installing the following, the local admin is asserting that:\n\
        #\n# 1. The python module load path used by privsep-helper\n#    command as\
        \ root (as started by sudo/rootwrap) is trusted.\n# 2. Any oslo.config files\
        \ matching the --config-file\n#    arguments below are trusted.\n# 3. Users\
        \ allowed to run sudo/rootwrap with this configuration(*) are\n#    also allowed\
        \ to invoke python \"entrypoint\" functions from\n#    --privsep_context with\
        \ the additional (possibly root) privileges\n#    configured for that context.\n\
        #\n# (*) ie: the user is allowed by /etc/sudoers to run rootwrap as root\n\
        #\n# In particular, the oslo.config and python module path must not\n# be\
        \ writeable by the unprivileged user.\n\n# oslo.privsep default neutron context\n\
        privsep: PathFilter, privsep-helper, root,\n --config-file, /etc,\n --privsep_context,\
        \ neutron.privileged.default,\n --privsep_sock_path, /\n\n# NOTE: A second\
        \ `--config-file` arg can also be added above. Since\n# many neutron components\
        \ are installed like that (eg: by devstack).\n# Adjust to suit local requirements.\n"
      pods:
      - dhcp_agent
      - l3_agent
      - metadata_agent
      - ovn_agent
      - ovn_metadata_agent
      - ovn_vpn_agent
      - ovs_agent
      - sriov_agent
      - netns_cleanup_cron
  sriov_init:
  - null
