# Full OpenStack-Helm memcached defaults with the blueprint's validated overrides applied
# (2025.1-ubuntu_jammy images, single-replica, Krateo-CDC-friendly). A small curated
# subset is overridable per Composition (see values.schema.json).
conf:
  memcached:
    max_connections: 8192
    memory: 1024
    stats_cachedump:
      enabled: true
dependencies:
  dynamic:
    common:
      local_image_registry:
        jobs:
        - memcached-image-repo-sync
        services:
        - endpoint: node
          service: local_image_registry
  static:
    image_repo_sync:
      services:
      - endpoint: internal
        service: local_image_registry
    memcached:
      jobs: null
endpoints:
  cluster_domain_suffix: cluster.local
  kube_dns:
    host_fqdn_override:
      default: null
    hosts:
      default: kube-dns
    name: kubernetes-dns
    namespace: kube-system
    path:
      default: null
    port:
      dns:
        default: 53
        protocol: UDP
      dns_tcp:
        default: 53
    scheme: http
  local_image_registry:
    host_fqdn_override:
      default: null
    hosts:
      default: localhost
      internal: docker-registry
      node: localhost
    name: docker-registry
    namespace: docker-registry
    port:
      registry:
        node: 5000
  oci_image_registry:
    auth:
      enabled: false
      memcached:
        password: password
        username: memcached
    host_fqdn_override:
      default: null
    hosts:
      default: localhost
    name: oci-image-registry
    namespace: oci-image-registry
    port:
      registry:
        default: null
  oslo_cache:
    host_fqdn_override:
      default: null
    hosts:
      default: memcached
    namespace: null
    port:
      memcache:
        default: 11211
extraObjects: []
images:
  local_registry:
    active: false
    exclude:
    - dep_check
    - image_repo_sync
  pull_policy: IfNotPresent
  tags:
    dep_check: quay.io/airshipit/kubernetes-entrypoint:latest-ubuntu_noble
    image_repo_sync: quay.io/airshipit/docker:27.5.0
    memcached: quay.io/airshipit/memcached:1.6.32
labels:
  server:
    node_selector_key: openstack-control-plane
    node_selector_value: enabled
manifests:
  configmap_bin: true
  job_image_repo_sync: true
  network_policy: false
  secret_registry: true
  service: true
  statefulset: true
memcached:
  extraContainers: []
  extraServicePorts: []
network:
  memcached: {}
network_policy:
  memcached:
    egress:
    - {}
    ingress:
    - {}
pod:
  affinity:
    anti:
      topologyKey:
        default: kubernetes.io/hostname
      type:
        default: requiredDuringSchedulingIgnoredDuringExecution
      weight:
        default: 10
  lifecycle:
    termination_grace_period:
      memcached:
        timeout: 30
    upgrades:
      deployments:
        pod_replacement_strategy: RollingUpdate
        revision_history: 3
        rolling_update:
          max_unavailable: 1
  probes:
    memcached:
      memcached:
        liveness:
          enabled: true
          params:
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 10
        readiness:
          enabled: true
          params:
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 5
  replicas:
    server: 1
  resources:
    enabled: false
    jobs:
      image_repo_sync:
        limits:
          cpu: 2000m
          memory: 1024Mi
        requests:
          cpu: 100m
          memory: 128Mi
    memcached:
      limits:
        cpu: 2000m
        memory: 1024Mi
      requests:
        cpu: 500m
        memory: 128Mi
  security_context:
    server:
      container:
        memcached:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
      pod:
        fsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
  tolerations:
    memcached:
      enabled: false
      tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/master
        operator: Exists
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
        operator: Exists
secrets:
  oci_image_registry:
    memcached: memcached-oci-image-registry-key
