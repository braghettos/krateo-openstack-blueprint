# Full OpenStack-Helm glance defaults with the blueprint's validated overrides applied
# (2025.1-ubuntu_jammy images, single-replica, Krateo-CDC-friendly). A small curated
# subset is overridable per Composition (see values.schema.json).
bootstrap:
  enabled: true
  ks_user: admin
  script: null
  structured:
    images:
      cirros:
        container_format: bare
        id: null
        image_file: cirros-0.6.2-x86_64-disk.img
        image_type: qcow2
        min_disk: 1
        name: Cirros 0.6.2 64-bit
        private: true
        properties:
          os_distro: cirros
        source_url: http://download.cirros-cloud.net/0.6.2/
ceph_client:
  configmap: ceph-etc
  user_secret_name: pvc-ceph-client-key
conf:
  api_audit_map:
    DEFAULT:
      target_endpoint_type: None
    path_keywords:
      detail: None
      file: None
      images: image
      members: member
      tags: tag
    service_endpoints:
      image: service/storage/image
  ceph:
    admin_keyring: null
    append: null
    monitors: []
    override: null
  ceph_client:
    append: null
    override: null
  glance:
    DEFAULT:
      bind_port: null
      enable_v1_api: false
      log_config_append: /etc/glance/logging.conf
      workers: 1
    cors: {}
    database:
      connection: ''
      max_retries: -1
    file:
      filesystem_store_datadir: /var/lib/glance/images
    glance_store:
      cinder_catalog_info: volumev3::internalURL
      default_swift_reference: ref1
      filesystem_store_datadir: /var/lib/glance/images
      rbd_store_ceph_conf: /etc/ceph/ceph.conf
      rbd_store_chunk_size: 8
      rbd_store_crush_rule: replicated_rule
      rbd_store_pool: glance.images
      rbd_store_replication: 3
      rbd_store_user: glance
      swift_store_config_file: /etc/glance/swift-store.conf
      swift_store_container: glance
      swift_store_create_container_on_put: true
      swift_store_endpoint_type: internalURL
    keystone_authtoken:
      auth_type: password
      auth_version: v3
      memcache_security_strategy: ENCRYPT
      service_token_roles: service
      service_token_roles_required: true
      service_type: image
    os_glance_staging_store:
      filesystem_store_datadir: /var/lib/glance/tmp/os_glance_staging_store
    os_glance_tasks_store:
      filesystem_store_datadir: /var/lib/glance/tmp/os_glance_tasks_store
    oslo_concurrency:
      lock_path: /var/lock
    oslo_messaging_notifications:
      driver: noop
    oslo_messaging_rabbit:
      rabbit_ha_queues: true
    oslo_middleware:
      enable_proxy_headers_parsing: true
    oslo_policy:
      policy_file: /etc/glance/policy.yaml
    paste_deploy:
      flavor: keystone
    rbd:
      rbd_store_ceph_conf: /etc/ceph/ceph.conf
      rbd_store_chunk_size: 8
      rbd_store_crush_rule: replicated_rule
      rbd_store_pool: glance.images
      rbd_store_replication: 3
      rbd_store_user: glance
    swift:
      default_swift_reference: ref1
      swift_store_config_file: /etc/glance/swift-store.conf
      swift_store_container: glance
      swift_store_create_container_on_put: true
      swift_store_endpoint_type: internalURL
  glance_api_uwsgi:
    uwsgi:
      add-header: 'Connection: close'
      buffer-size: 65535
      die-on-term: true
      enable-threads: true
      exit-on-reload: false
      hook-master-start: unix_signal:15 gracefully_kill_them_all
      lazy-apps: true
      log-x-forwarded-for: true
      master: true
      module: glance.wsgi.api:application
      procname-prefix-spaced: 'glance-api:'
      route-user-agent: '^kube-probe.* donotlog:'
      stats: 0.0.0.0:1717
      stats-http: true
      thunder-lock: true
      worker-reload-mercy: 80
  glance_sudoers: '# This sudoers file supports rootwrap for both Kolla and LOCI Images.

    Defaults !requiretty

    Defaults secure_path="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/snap/bin:/var/lib/openstack/bin:/var/lib/kolla/venv/bin"

    glance ALL = (root) NOPASSWD: /var/lib/kolla/venv/bin/glance-rootwrap /etc/glance/rootwrap.conf
    *, /var/lib/openstack/bin/glance-rootwrap /etc/glance/rootwrap.conf *

    '
  logging:
    formatter_context:
      class: oslo_log.formatters.ContextFormatter
      datefmt: '%Y-%m-%d %H:%M:%S'
    formatter_default:
      datefmt: '%Y-%m-%d %H:%M:%S'
      format: '%(message)s'
    formatters:
      keys:
      - context
      - default
    handler_null:
      args: ()
      class: logging.NullHandler
      formatter: default
    handler_stderr:
      args: (sys.stderr,)
      class: StreamHandler
      formatter: context
    handler_stdout:
      args: (sys.stdout,)
      class: StreamHandler
      formatter: context
    handlers:
      keys:
      - stdout
      - stderr
      - 'null'
    logger_amqp:
      handlers: stderr
      level: WARNING
      qualname: amqp
    logger_amqplib:
      handlers: stderr
      level: WARNING
      qualname: amqplib
    logger_boto:
      handlers: stderr
      level: WARNING
      qualname: boto
    logger_eventletwsgi:
      handlers: stderr
      level: WARNING
      qualname: eventlet.wsgi.server
    logger_glance:
      handlers:
      - stdout
      level: INFO
      qualname: glance
    logger_root:
      handlers: 'null'
      level: WARNING
    logger_sqlalchemy:
      handlers: stderr
      level: WARNING
      qualname: sqlalchemy
    loggers:
      keys:
      - root
      - glance
  paste:
    app:apiv2app:
      paste.app_factory: glance.api.v2.router:API.factory
    app:apiversions:
      paste.app_factory: glance.api.versions:create_resource
    app:healthcheck:
      backends: disable_by_file
      disable_by_file_path: /etc/glance/healthcheck_disable
      paste.app_factory: oslo_middleware:Healthcheck.app_factory
    composite:api:
      cachemanagement: cors http_proxy_to_wsgi versionnegotiation osprofiler unauthenticated-context
        cache cachemanage rootapp
      caching: cors http_proxy_to_wsgi versionnegotiation osprofiler unauthenticated-context
        cache rootapp
      default: cors http_proxy_to_wsgi versionnegotiation osprofiler unauthenticated-context
        rootapp
      keystone: cors http_proxy_to_wsgi versionnegotiation osprofiler authtoken context
        rootapp
      keystone+cachemanagement: cors http_proxy_to_wsgi versionnegotiation osprofiler
        authtoken context cache cachemanage rootapp
      keystone+caching: cors http_proxy_to_wsgi versionnegotiation osprofiler authtoken
        context cache rootapp
      paste.composite_factory: glance.api:pipeline_factory
    composite:glance-api:
      /: api
      /healthcheck: healthcheck
      paste.composite_factory: glance.api:root_app_factory
    composite:glance-api-cachemanagement:
      /: api
      /healthcheck: healthcheck
      paste.composite_factory: glance.api:root_app_factory
    composite:glance-api-caching:
      /: api
      /healthcheck: healthcheck
      paste.composite_factory: glance.api:root_app_factory
    composite:glance-api-keystone:
      /: api
      /healthcheck: healthcheck
      paste.composite_factory: glance.api:root_app_factory
    composite:glance-api-keystone+cachemanagement:
      /: api
      /healthcheck: healthcheck
      paste.composite_factory: glance.api:root_app_factory
    composite:glance-api-keystone+caching:
      /: api
      /healthcheck: healthcheck
      paste.composite_factory: glance.api:root_app_factory
    composite:rootapp:
      /: apiversions
      /v2: apiv2app
      paste.composite_factory: glance.api:root_app_factory
    filter:authtoken:
      delay_auth_decision: true
      paste.filter_factory: keystonemiddleware.auth_token:filter_factory
    filter:cache:
      paste.filter_factory: glance.api.middleware.cache:CacheFilter.factory
    filter:cachemanage:
      paste.filter_factory: glance.api.middleware.cache_manage:CacheManageFilter.factory
    filter:context:
      paste.filter_factory: glance.api.middleware.context:ContextMiddleware.factory
    filter:cors:
      oslo_config_program: glance-api
      oslo_config_project: glance
      paste.filter_factory: oslo_middleware.cors:filter_factory
    filter:gzip:
      paste.filter_factory: glance.api.middleware.gzip:GzipMiddleware.factory
    filter:http_proxy_to_wsgi:
      paste.filter_factory: oslo_middleware:HTTPProxyToWSGI.factory
    filter:osprofiler:
      paste.filter_factory: osprofiler.web:WsgiMiddleware.factory
    filter:unauthenticated-context:
      paste.filter_factory: glance.api.middleware.context:UnauthenticatedContextMiddleware.factory
    filter:versionnegotiation:
      paste.filter_factory: glance.api.middleware.version_negotiation:VersionNegotiationFilter.factory
  policy: {}
  rabbitmq:
    policies:
    - apply-to: all
      definition:
        ha-mode: all
        ha-sync-mode: automatic
        message-ttl: 70000
      name: ha_ttl_glance
      pattern: ^(?!(amq\.|reply_)).*
      priority: 0
      vhost: glance
  rally_tests:
    run_tempest: false
    tests:
      GlanceImages.create_and_delete_image:
      - args:
          container_format: bare
          disk_format: qcow2
          image_location: http://download.cirros-cloud.net/0.6.2/cirros-0.6.2-x86_64-disk.img
        runner:
          concurrency: 1
          times: 1
          type: constant
        sla:
          failure_rate:
            max: 0
      GlanceImages.create_and_list_image:
      - args:
          container_format: bare
          disk_format: qcow2
          image_location: http://download.cirros-cloud.net/0.6.2/cirros-0.6.2-x86_64-disk.img
        runner:
          concurrency: 1
          times: 1
          type: constant
        sla:
          failure_rate:
            max: 0
  rootwrap: '# Configuration for glance-rootwrap

    # This file should be owned by (and only-writable by) the root user


    [DEFAULT]

    # List of directories to load filter definitions from (separated by '','').

    # These directories MUST all be only writeable by root !

    filters_path=/etc/glance/rootwrap.d,/usr/share/glance/rootwrap


    # List of directories to search executables in, in case filters do not

    # explicitely specify a full path (separated by '','')

    # If not specified, defaults to system PATH environment variable.

    # These directories MUST all be only writeable by root !

    exec_dirs=/sbin,/usr/sbin,/bin,/usr/bin,/usr/local/bin,/usr/local/sbin,/var/lib/openstack/bin,/var/lib/kolla/venv/bin


    # Enable logging to syslog

    # Default value is False

    use_syslog=False


    # Which syslog facility to use.

    # Valid values include auth, authpriv, syslog, local0, local1...

    # Default value is ''syslog''

    syslog_log_facility=syslog


    # Which messages to log.

    # INFO means log all usage

    # ERROR means only log unsuccessful attempts

    syslog_log_level=ERROR

    '
  rootwrap_filters:
    glance_cinder_store:
      content: '# glance-rootwrap command filters for glance cinder store

        # This file should be owned by (and only-writable by) the root user


        [Filters]

        # cinder store driver

        disk_chown: RegExpFilter, chown, root, chown, \d+, /dev/(?!.*/\.\.).*


        # os-brick library commands

        # os_brick.privileged.run_as_root oslo.privsep context

        # This line ties the superuser privs with the config files, context name,

        # and (implicitly) the actual python code invoked.

        privsep-rootwrap: RegExpFilter, privsep-helper, root, privsep-helper, --config-file,
        /etc/(?!\.\.).*, --privsep_context, os_brick.privileged.default, --privsep_sock_path,
        /tmp/.*


        chown: CommandFilter, chown, root

        mount: CommandFilter, mount, root

        umount: CommandFilter, umount, root

        '
      pods:
      - api
  software:
    rbd:
      rbd_store_pool_app_name: glance-image
  swift_store: '[{{ .Values.conf.glance.glance_store.default_swift_reference }}]

    {{- if eq .Values.storage "radosgw" }}

    auth_version = 1

    auth_address = {{ tuple "ceph_object_store" "public" "api" . | include "helm-toolkit.endpoints.keystone_endpoint_uri_lookup"
    }}

    user = {{ .Values.endpoints.ceph_object_store.auth.glance.username }}:swift

    key = {{ .Values.endpoints.ceph_object_store.auth.glance.password }}

    {{- else }}

    user = {{ .Values.endpoints.identity.auth.glance.project_name }}:{{ .Values.endpoints.identity.auth.glance.username
    }}

    key = {{ .Values.endpoints.identity.auth.glance.password }}

    auth_address = {{ tuple "identity" "internal" "api" . | include "helm-toolkit.endpoints.keystone_endpoint_uri_lookup"
    }}

    user_domain_name = {{ .Values.endpoints.identity.auth.glance.user_domain_name
    }}

    project_domain_name = {{ .Values.endpoints.identity.auth.glance.project_domain_name
    }}

    auth_version = 3

    # NOTE(portdirect): https://bugs.launchpad.net/glance-store/+bug/1620999

    project_domain_id =

    user_domain_id =

    {{- end -}}

    '
dependencies:
  dynamic:
    common:
      local_image_registry:
        jobs:
        - glance-image-repo-sync
        services:
        - endpoint: node
          service: local_image_registry
  static:
    api:
      jobs:
      - glance-storage-init
      - glance-db-sync
      - glance-rabbit-init
      - glance-ks-user
      - glance-ks-endpoints
      services:
      - endpoint: internal
        service: oslo_db
      - endpoint: internal
        service: identity
      - endpoint: internal
        service: oslo_messaging
    bootstrap:
      jobs: null
      services:
      - endpoint: internal
        service: identity
      - endpoint: internal
        service: image
    clean:
      jobs: null
    db_drop:
      services:
      - endpoint: internal
        service: oslo_db
    db_init:
      services:
      - endpoint: internal
        service: oslo_db
    db_sync:
      jobs:
      - glance-db-init
      services:
      - endpoint: internal
        service: oslo_db
    image_repo_sync:
      services:
      - endpoint: internal
        service: local_image_registry
    ks_endpoints:
      jobs:
      - glance-ks-service
      services:
      - endpoint: internal
        service: identity
    ks_service:
      services:
      - endpoint: internal
        service: identity
    ks_user:
      services:
      - endpoint: internal
        service: identity
    metadefs_load:
      jobs:
      - glance-db-sync
      services: null
    rabbit_init:
      services:
      - endpoint: internal
        service: oslo_messaging
    storage_init:
      jobs:
      - glance-ks-user
      services: null
    tests:
      services:
      - endpoint: internal
        service: oslo_db
      - endpoint: internal
        service: identity
      - endpoint: internal
        service: image
endpoints:
  ceph_object_store:
    auth:
      glance:
        password: password
        tmpurlkey: supersecret
        username: glance
    host_fqdn_override:
      default: null
    hosts:
      default: ceph-rgw
      public: radosgw
    name: radosgw
    namespace: ceph
    path:
      default: /auth/v1.0
    port:
      api:
        default: 8088
        public: 80
    scheme:
      default: http
  cluster_domain_suffix: cluster.local
  dashboard:
    host_fqdn_override:
      default: null
    hosts:
      default: horizon-int
      public: horizon
    name: horizon
    path:
      default: null
    port:
      web:
        default: 80
        public: 443
    scheme:
      default: http
      public: https
  fluentd:
    host_fqdn_override:
      default: null
    hosts:
      default: fluentd-logging
    name: fluentd
    namespace: null
    path:
      default: null
    port:
      metrics:
        default: 24220
      service:
        default: 24224
    scheme: http
  identity:
    auth:
      admin:
        password: password
        project_domain_name: default
        project_name: admin
        region_name: RegionOne
        user_domain_name: default
        username: admin
      glance:
        password: password
        project_domain_name: service
        project_name: service
        region_name: RegionOne
        role: admin
        user_domain_name: service
        username: glance
      test:
        password: password
        project_domain_name: service
        project_name: test
        region_name: RegionOne
        role: admin
        user_domain_name: service
        username: glance-test
    host_fqdn_override:
      default: null
    hosts:
      default: keystone
      internal: keystone-api
    name: keystone
    path:
      default: /v3
    port:
      api:
        default: 80
        internal: 5000
    scheme:
      default: http
  image:
    host_fqdn_override:
      default: null
    hosts:
      default: glance-api
      public: glance
    name: glance
    path:
      default: null
      healthcheck: /healthcheck
    port:
      api:
        default: 9292
        public: 80
    scheme:
      default: http
      service: http
  ingress:
    hosts:
      default: ingress
    name: ingress
    namespace: null
    port:
      ingress:
        default: 80
  kube_dns:
    host_fqdn_override:
      default: null
    hosts:
      default: kube-dns
    name: kubernetes-dns
    namespace: kube-system
    path:
      default: null
    port:
      dns:
        default: 53
        protocol: UDP
    scheme: http
  local_image_registry:
    host_fqdn_override:
      default: null
    hosts:
      default: localhost
      internal: docker-registry
      node: localhost
    name: docker-registry
    namespace: docker-registry
    port:
      registry:
        node: 5000
  object_store:
    auth:
      glance:
        tmpurlkey: supersecret
    host_fqdn_override:
      default: null
    hosts:
      default: ceph-rgw
      public: radosgw
    name: swift
    namespace: ceph
    path:
      default: /swift/v1/KEY_$(tenant_id)s
    port:
      api:
        default: 8088
        public: 80
    scheme:
      default: http
  oci_image_registry:
    auth:
      enabled: false
      glance:
        password: password
        username: glance
    host_fqdn_override:
      default: null
    hosts:
      default: localhost
    name: oci-image-registry
    namespace: oci-image-registry
    port:
      registry:
        default: null
  oslo_cache:
    auth:
      memcache_secret_key: null
    host_fqdn_override:
      default: null
    hosts:
      default: memcached
    port:
      memcache:
        default: 11211
  oslo_db:
    auth:
      admin:
        password: password
        secret:
          tls:
            internal: mariadb-tls-direct
        username: root
      glance:
        password: password
        username: glance
    host_fqdn_override:
      default: null
    hosts:
      default: mariadb
    path: /glance
    port:
      mysql:
        default: 3306
    scheme: mysql+pymysql
  oslo_messaging:
    auth:
      admin:
        password: password
        secret:
          tls:
            internal: rabbitmq-tls-direct
        username: rabbitmq
      glance:
        password: password
        username: glance
    host_fqdn_override:
      default: null
    hosts:
      default: rabbitmq
    path: /glance
    port:
      amqp:
        default: 5672
      http:
        default: 15672
    scheme: rabbit
    statefulset:
      name: rabbitmq-rabbitmq
      replicas: 2
extraObjects: []
identity:
  openrc:
    exclude_vars: []
    extra_vars: []
images:
  local_registry:
    active: false
    exclude:
    - dep_check
    - image_repo_sync
  pull_policy: IfNotPresent
  tags:
    bootstrap: quay.io/airshipit/openstack-client:2025.1-ubuntu_jammy
    db_drop: quay.io/airshipit/openstack-client:2025.1-ubuntu_jammy
    db_init: quay.io/airshipit/openstack-client:2025.1-ubuntu_jammy
    dep_check: quay.io/airshipit/kubernetes-entrypoint:latest-ubuntu_noble
    glance_api: quay.io/airshipit/glance:2025.1-ubuntu_jammy
    glance_db_sync: quay.io/airshipit/glance:2025.1-ubuntu_jammy
    glance_metadefs_load: quay.io/airshipit/glance:2025.1-ubuntu_jammy
    glance_storage_init: quay.io/airshipit/ceph-config-helper:latest-ubuntu_jammy
    image_repo_sync: docker.io/docker:17.07.0
    ks_endpoints: quay.io/airshipit/openstack-client:2025.1-ubuntu_jammy
    ks_service: quay.io/airshipit/openstack-client:2025.1-ubuntu_jammy
    ks_user: quay.io/airshipit/openstack-client:2025.1-ubuntu_jammy
    rabbit_init: docker.io/rabbitmq:3.13-management
    test: docker.io/xrally/xrally-openstack:2.0.0
keep_pvc: true
labels:
  api:
    node_selector_key: openstack-control-plane
    node_selector_value: enabled
  job:
    node_selector_key: openstack-control-plane
    node_selector_value: enabled
  test:
    node_selector_key: openstack-control-plane
    node_selector_value: enabled
manifests:
  certificates: false
  configmap_bin: true
  configmap_etc: true
  deployment_api: true
  ingress_api: true
  job_bootstrap: true
  job_clean: true
  job_db_drop: false
  job_db_init: true
  job_db_sync: true
  job_image_repo_sync: true
  job_ks_endpoints: true
  job_ks_service: true
  job_ks_user: true
  job_metadefs_load: true
  job_rabbit_init: false
  job_storage_init: true
  network_policy: false
  pdb_api: true
  pod_rally_test: false
  pvc_images: true
  secret_db: true
  secret_ingress_tls: true
  secret_keystone: true
  secret_rabbitmq: true
  secret_registry: true
  service_api: true
  service_ingress_api: true
network:
  api:
    external_policy_local: false
    ingress:
      annotations:
        haproxy.org/path-rewrite: /
        nginx.ingress.kubernetes.io/proxy-body-size: '0'
        nginx.ingress.kubernetes.io/rewrite-target: /
      classes:
        cluster: ingress-cluster
        namespace: ingress-openstack
      public: true
    node_port:
      enabled: false
      port: 30092
network_policy:
  glance:
    egress:
    - {}
    ingress:
    - {}
pod:
  affinity:
    anti:
      topologyKey:
        default: kubernetes.io/hostname
      type:
        default: preferredDuringSchedulingIgnoredDuringExecution
      weight:
        default: 10
  etcSources:
    glance_api: []
    glance_db_sync: []
    glance_metadefs_load: []
  lifecycle:
    disruption_budget:
      api:
        min_available: 0
    termination_grace_period:
      api:
        timeout: 30
    upgrades:
      deployments:
        pod_replacement_strategy: RollingUpdate
        revision_history: 3
        rolling_update:
          max_surge: 3
          max_unavailable: 1
  mounts:
    glance_api:
      glance_api:
        volumeMounts: null
        volumes: null
      init_container: null
    glance_db_sync:
      glance_db_sync:
        volumeMounts: null
        volumes: null
    glance_tests:
      glance_tests:
        volumeMounts: null
        volumes: null
      init_container: null
  probes:
    api:
      glance-api:
        liveness:
          enabled: true
          params:
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
        readiness:
          enabled: true
          params:
            periodSeconds: 10
            timeoutSeconds: 5
  replicas:
    api: 1
  resources:
    api:
