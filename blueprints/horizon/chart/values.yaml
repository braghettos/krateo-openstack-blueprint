# Full OpenStack-Helm horizon defaults with the blueprint's validated overrides applied
# (2025.1-ubuntu_jammy images, single-replica, Krateo-CDC-friendly). A small curated
# subset is overridable per Composition (see values.schema.json).
conf:
  horizon:
    apache: "LogFormat \"%h %l %u %t \\\"%r\\\" %>s %b \\\"%{Referer}i\\\" \\\"%{User-Agent}i\\\
      \"\" combined\nLogFormat \"%{X-Forwarded-For}i %l %u %t \\\"%r\\\" %>s %b \\\
      \"%{Referer}i\\\" \\\"%{User-Agent}i\\\"\" proxy\n\nSetEnvIf X-Forwarded-For\
      \ \"^.*\\..*\\..*\\..*\" forwarded\nCustomLog /dev/stdout combined env=!forwarded\n\
      CustomLog /dev/stdout proxy env=forwarded\n\n<VirtualHost *:{{ tuple \"dashboard\"\
      \ \"internal\" \"web\" . | include \"helm-toolkit.endpoints.endpoint_port_lookup\"\
      \ }}>\n    WSGIApplicationGroup %{GLOBAL}\n    WSGIScriptReloading On\n    WSGIDaemonProcess\
      \ horizon-http processes=5 threads=1 user=horizon group=horizon display-name=%{GROUP}\n\
      \    WSGIProcessGroup horizon-http\n    WSGIScriptAlias / /var/www/cgi-bin/horizon/django.wsgi\n\
      \    WSGIPassAuthorization On\n    RewriteEngine on\n    RewriteCond %{REQUEST_METHOD}\
      \ !^(POST|PUT|GET|DELETE|PATCH)\n    RewriteRule .* - [F]\n\n    <Location \"\
      /\">\n        Require all granted\n    </Location>\n\n    Alias /static /var/www/html/horizon\n\
      \    <Location \"/static\">\n        SetHandler static\n    </Location>\n\n\
      \    ErrorLogFormat \"%{cu}t %M\"\n    ErrorLog /dev/stdout\n    TransferLog\
      \ /dev/stdout\n\n    SetEnvIf X-Forwarded-For \"^.*\\..*\\..*\\..*\" forwarded\n\
      \    CustomLog /dev/stdout combined env=!forwarded\n    CustomLog /dev/stdout\
      \ proxy env=forwarded\n</Virtualhost>\n"
    branding:
      favicon: null
      logo: null
      logo_splash: null
    custom_panels: {}
    extra_panels:
    - heat_dashboard
    - neutron_taas_dashboard
    local_settings:
      config:
        allowed_hosts:
        - '*'
        auth:
          idp_mapping:
          - idp: myidp1
            label: Acme Corporation - OpenID Connect
            name: acme_oidc
            protocol: oidc
          - idp: myidp2
            label: Acme Corporation - SAML2
            name: acme_saml2
            protocol: saml2
          sso:
            enabled: false
            initial_choice: credentials
        cache_backend: django.core.cache.backends.memcached.PyMemcacheCache
        csrf_cookie_httponly: 'False'
        csrf_cookie_secure: 'False'
        csrf_trusted_origins: []
        debug: 'False'
        disable_password_reveal: 'True'
        disallow_iframe_embed: 'False'
        enable_pwd_validator: false
        endpoint_type: internalURL
        enforce_password_check: 'True'
        horizon_images_upload_mode: legacy
        horizon_secret_key: 9aee62c0-5253-4a86-b189-e0fb71fa503c
        keystone_default_domain: Default
        keystone_domains:
          Default: Default
          example_domain: example
        keystone_multidomain_dropdown: 'False'
        keystone_multidomain_support: 'True'
        log_level: DEBUG
        openstack_api_versions:
          container_infra: '1.10'
        openstack_cinder_features:
          enable_backup: 'True'
        openstack_enable_password_retrieve: 'False'
        openstack_neutron_network:
          enable_distributed_router: 'False'
          enable_fip_topology_check: 'True'
          enable_firewall: 'True'
          enable_ha_router: 'False'
          enable_ipv6: 'True'
          enable_lb: 'True'
          enable_quotas: 'True'
          enable_router: 'True'
          enable_vpn: 'True'
        password_autocomplete: 'False'
        pwd_validator_help_text: '_("Your password must be at least eight (8) characters
          in length and must include characters from at least two (2) of these groupings:
          alpha, numeric, and special characters.")'
        pwd_validator_regex: (?=.*[a-zA-Z])(?=.*\d).{8,}|(?=.*\d)(?=.*\W).{8,}|(?=.*\W)(?=.*[a-zA-Z]).{8,}
        raw: {}
        secure_proxy_ssl_header: false
        session_cookie_httponly: 'False'
        session_cookie_secure: 'False'
        session_engine: django.contrib.sessions.backends.cache
        show_openrc_file: 'True'
        ssl_no_verify: 'True'
        use_ssl: 'False'
      template: "import os\n\nfrom django.utils.translation import gettext_lazy as\
        \ _\n\nfrom openstack_dashboard import exceptions\n\nDEBUG = {{ .Values.conf.horizon.local_settings.config.debug\
        \ }}\nTEMPLATE_DEBUG = DEBUG\n\nCOMPRESS_OFFLINE = True\nCOMPRESS_CSS_HASHING_METHOD\
        \ = \"hash\"\n\n# WEBROOT is the location relative to Webserver root\n# should\
        \ end with a slash.\nWEBROOT = '/'\n# LOGIN_URL = WEBROOT + 'auth/login/'\n\
        # LOGOUT_URL = WEBROOT + 'auth/logout/'\n#\n# LOGIN_REDIRECT_URL can be used\
        \ as an alternative for\n# HORIZON_CONFIG.user_home, if user_home is not set.\n\
        # Do not set it to '/home/', as this will cause circular redirect loop\n#\
        \ LOGIN_REDIRECT_URL = WEBROOT\n\n# Required for Django 1.5.\n# If horizon\
        \ is running in production (DEBUG is False), set this\n# with the list of\
        \ host/domain names that the application can serve.\n# For more information\
        \ see:\n# https://docs.djangoproject.com/en/dev/ref/settings/#allowed-hosts\n\
        ALLOWED_HOSTS = [{{ include \"helm-toolkit.utils.joinListWithCommaAndSingleQuotes\"\
        \ .Values.conf.horizon.local_settings.config.allowed_hosts }},'%s' % (os.environ.get(\"\
        MY_POD_IP\"))]\n\n# Set SSL proxy settings:\n# For Django 1.4+ pass this header\
        \ from the proxy after terminating the SSL,\n# and don't forget to strip it\
        \ from the client's request.\n# For more information see:\n# https://docs.djangoproject.com/en/1.4/ref/settings/#secure-proxy-ssl-header\n\
        #SECURE_PROXY_SSL_HEADER = ('HTTP_X_FORWARDED_PROTOCOL', 'https')\n# https://docs.djangoproject.com/en/1.5/ref/settings/#secure-proxy-ssl-header\n\
        {{- if .Values.conf.horizon.local_settings.config.secure_proxy_ssl_header\
        \ }}\nSECURE_PROXY_SSL_HEADER = ('HTTP_X_FORWARDED_PROTO', 'https')\n{{- end\
        \ }}\n\n# If Horizon is being served through SSL, then uncomment the following\
        \ two\n# settings to better secure the cookies from security exploits\nUSE_SSL\
        \ = {{ .Values.conf.horizon.local_settings.config.use_ssl }}\nCSRF_COOKIE_SECURE\
        \ = {{ .Values.conf.horizon.local_settings.config.csrf_cookie_secure }}\n\
        CSRF_COOKIE_HTTPONLY = {{ .Values.conf.horizon.local_settings.config.csrf_cookie_httponly\
        \ }}\nSESSION_COOKIE_SECURE = {{ .Values.conf.horizon.local_settings.config.session_cookie_secure\
        \ }}\n\nSESSION_COOKIE_HTTPONLY = {{ .Values.conf.horizon.local_settings.config.session_cookie_httponly\
        \ }}\n\n# https://docs.djangoproject.com/en/dev/ref/settings/#csrf-trusted-origins\n\
        CSRF_TRUSTED_ORIGINS = [{{ include \"helm-toolkit.utils.joinListWithCommaAndSingleQuotes\"\
        \ .Values.conf.horizon.local_settings.config.csrf_trusted_origins }}]\n\n\
        # Overrides for OpenStack API versions. Use this setting to force the\n# OpenStack\
        \ dashboard to use a specific API version for a given service API.\n# Versions\
        \ specified here should be integers or floats, not strings.\n# NOTE: The version\
        \ should be formatted as it appears in the URL for the\n# service API. For\
        \ example, The identity service APIs have inconsistent\n# use of the decimal\
        \ point, so valid options would be 2.0 or 3.\n#OPENSTACK_API_VERSIONS = {\n\
        #    \"data-processing\": 1.1,\n#    \"identity\": 3,\n#    \"volume\": 2,\n\
        #}\n\nOPENSTACK_API_VERSIONS = {\n    \"identity\": 3,\n    \"container-infra\"\
        : \"{{ .Values.conf.horizon.local_settings.config.openstack_api_versions.container_infra\
        \ }}\"\n}\n\n# Set this to True if running on multi-domain model. When this\
        \ is enabled, it\n# will require user to enter the Domain name in addition\
        \ to username for login.\nOPENSTACK_KEYSTONE_MULTIDOMAIN_SUPPORT = {{ .Values.conf.horizon.local_settings.config.keystone_multidomain_support\
        \ }}\nOPENSTACK_KEYSTONE_DOMAIN_DROPDOWN = {{ .Values.conf.horizon.local_settings.config.keystone_multidomain_dropdown\
        \ }}\n{{- $multiDomainDropdown := eq (lower .Values.conf.horizon.local_settings.config.keystone_multidomain_dropdown)\
        \ \"true\" }}\n{{- if $multiDomainDropdown }}\nOPENSTACK_KEYSTONE_DOMAIN_CHOICES\
        \ = (\n{{- range $key, $label := .Values.conf.horizon.local_settings.config.keystone_domains\
        \ }}\n    ('{{ $key }}', _('{{ $label }}')),\n{{- end }}\n)\n{{- end }}\n\n\
        # Overrides the default domain used when running on single-domain model\n\
        # with Keystone V3. All entities will be created in the default domain.\n\
        OPENSTACK_KEYSTONE_DEFAULT_DOMAIN = '{{ .Values.conf.horizon.local_settings.config.keystone_default_domain\
        \ }}'\n\n# Set Console type:\n# valid options are \"AUTO\"(default), \"VNC\"\
        , \"SPICE\", \"RDP\", \"SERIAL\" or None\n# Set to None explicitly if you\
        \ want to deactivate the console.\n#CONSOLE_TYPE = \"AUTO\"\n\n# Default OpenStack\
        \ Dashboard configuration.\nHORIZON_CONFIG = {\n    'user_home': 'openstack_dashboard.views.get_user_home',\n\
        \    'ajax_queue_limit': 10,\n    'auto_fade_alerts': {\n        'delay':\
        \ 3000,\n        'fade_duration': 1500,\n        'types': ['alert-success',\
        \ 'alert-info']\n    },\n    'help_url': \"http://docs.openstack.org\",\n\
        \    'exceptions': {'recoverable': exceptions.RECOVERABLE,\n             \
        \      'not_found': exceptions.NOT_FOUND,\n                   'unauthorized':\
        \ exceptions.UNAUTHORIZED},\n    'modal_backdrop': 'static',\n    'angular_modules':\
        \ [],\n    'js_files': [],\n    'js_spec_files': [],\n}\n\n{{- if .Values.conf.horizon.local_settings.config.enable_pwd_validator\
        \ }}\n# Specify a regular expression to validate user passwords.\nHORIZON_CONFIG[\"\
        password_validator\"] = {\n    \"regex\": '{{ .Values.conf.horizon.local_settings.config.pwd_validator_regex\
        \ }}',\n    \"help_text\": {{ .Values.conf.horizon.local_settings.config.pwd_validator_help_text\
        \ }},\n}\n{{- end }}\n\n# Disable simplified floating IP address management\
        \ for deployments with\n# multiple floating IP pools or complex network requirements.\n\
        #HORIZON_CONFIG[\"simple_ip_management\"] = False\n\n# Turn off browser autocompletion\
        \ for forms including the login form and\n# the database creation workflow\
        \ if so desired.\nHORIZON_CONFIG[\"password_autocomplete\"] = '{{ .Values.conf.horizon.local_settings.config.password_autocomplete\
        \ }}'\n\n# Setting this to True will disable the reveal button for password\
        \ fields,\n# including on the login form.\nHORIZON_CONFIG[\"disable_password_reveal\"\
        ] = {{ .Values.conf.horizon.local_settings.config.disable_password_reveal\
        \ }}\n\nLOCAL_PATH = '/tmp'\n\n# Set custom secret key:\n# You can either\
        \ set it to a specific value or you can let horizon generate a\n# default\
        \ secret key that is unique on this machine, e.i. regardless of the\n# amount\
        \ of Python WSGI workers (if used behind Apache+mod_wsgi): However,\n# there\
        \ may be situations where you would want to set this explicitly, e.g.\n# when\
        \ multiple dashboard instances are distributed on different machines\n# (usually\
        \ behind a load-balancer). Either you have to make sure that a session\n#\
        \ gets all requests routed to the same dashboard instance or you set the same\n\
        # SECRET_KEY for all of them.\nSECRET_KEY='{{ .Values.conf.horizon.local_settings.config.horizon_secret_key\
        \ }}'\n\nCACHES = {\n    'default': {\n        'BACKEND': '{{ .Values.conf.horizon.local_settings.config.cache_backend\
        \ }}',\n        'LOCATION': '{{ tuple \"oslo_cache\" \"internal\" \"memcache\"\
        \ . | include \"helm-toolkit.endpoints.host_and_port_endpoint_uri_lookup\"\
        \ }}',\n    }\n}\nDATABASES = {\n    'default': {\n        # Database configuration\
        \ here\n        'ENGINE': 'django.db.backends.mysql',\n        'NAME': '{{\
        \ .Values.endpoints.oslo_db.path | base }}',\n        'USER': '{{ .Values.endpoints.oslo_db.auth.horizon.username\
        \ }}',\n        'PASSWORD': '{{ .Values.endpoints.oslo_db.auth.horizon.password\
        \ }}',\n        'HOST': '{{ tuple \"oslo_db\" \"internal\" . | include \"\
        helm-toolkit.endpoints.hostname_fqdn_endpoint_lookup\" }}',\n        'default-character-set':\
        \ 'utf8',\n        {{- if .Values.manifests.certificates }}\n        'OPTIONS':{\n\
        \            'ssl': {\n                'ca': '/etc/mysql/certs/ca.crt',\n\
        \                'cert': '/etc/mysql/certs/tls.crt',\n                'key':\
        \ '/etc/mysql/certs/tls.key'\n            }\n        },\n        {{- end }}\n\
        \        'PORT': '{{ tuple \"oslo_db\" \"internal\" \"mysql\" . | include\
        \ \"helm-toolkit.endpoints.endpoint_port_lookup\" }}'\n    }\n}\nSESSION_ENGINE\
        \ = '{{ .Values.conf.horizon.local_settings.config.session_engine }}'\n\n\
        # Send email to the console by default\nEMAIL_BACKEND = 'django.core.mail.backends.console.EmailBackend'\n\
        # Or send them to /dev/null\n#EMAIL_BACKEND = 'django.core.mail.backends.dummy.EmailBackend'\n\
        \n# Configure these for your outgoing email host\n#EMAIL_HOST = 'smtp.my-company.com'\n\
        #EMAIL_PORT = 25\\\\\n#EMAIL_HOST_USER = 'djangomail'\n#EMAIL_HOST_PASSWORD\
        \ = 'top-secret!'\n\n# For multiple regions uncomment this configuration,\
        \ and add (endpoint, title).\n#AVAILABLE_REGIONS = [\n#    ('http://cluster1.example.com:5000/v2.0',\
        \ 'cluster1'),\n#    ('http://cluster2.example.com:5000/v2.0', 'cluster2'),\n\
        #]\n\nOPENSTACK_KEYSTONE_URL = \"{{ tuple \"identity\" \"internal\" \"api\"\
        \ . | include \"helm-toolkit.endpoints.keystone_endpoint_uri_lookup\" }}\"\
        \nOPENSTACK_KEYSTONE_DEFAULT_ROLE = \"member\"\n\n# This setting specifies\
        \ the name of the header with remote IP address. If not present,\n# then REMOTE_ADDR\
        \ header is used. The commom value for this setting is HTTP_X_REAL_IP\n# or\
        \ HTTP_X_FORWARDED_FORx\nSECURE_PROXY_ADDR_HEADER = 'HTTP_X_FORWARDED_FOR'\n\
        \n{{- if .Values.conf.horizon.local_settings.config.auth.sso.enabled }}\n\
        # Enables keystone web single-sign-on if set to True.\nWEBSSO_ENABLED = True\n\
        \n# Determines which authentication choice to show as default.\nWEBSSO_INITIAL_CHOICE\
        \ = \"{{ .Values.conf.horizon.local_settings.config.auth.sso.initial_choice\
        \ }}\"\n\n{{- if .Values.conf.horizon.local_settings.config.auth.sso.websso_keystone_url\
        \ }}\n# The full auth URL for the Keystone endpoint used for web single-sign-on\
        \ authentication.\nWEBSSO_KEYSTONE_URL = \"{{ .Values.conf.horizon.local_settings.config.auth.sso.websso_keystone_url\
        \ }}\"\n{{- end }}\n\n# The list of authentication mechanisms\n# which include\
        \ keystone federation protocols.\n# Current supported protocol IDs are 'saml2'\
        \ and 'oidc'\n# which represent SAML 2.0, OpenID Connect respectively.\n#\
        \ Do not remove the mandatory credentials mechanism.\nWEBSSO_CHOICES = (\n\
        \    (\"credentials\", _(\"Keystone Credentials\")),\n  {{- range $i, $sso\
        \ := .Values.conf.horizon.local_settings.config.auth.idp_mapping }}\n    ({{\
        \ $sso.name | quote }}, {{ $sso.label | quote }}),\n  {{- end }}\n)\n\nWEBSSO_IDP_MAPPING\
        \ = {\n  {{- range $i, $sso := .Values.conf.horizon.local_settings.config.auth.idp_mapping\
        \ }}\n    {{ $sso.name | quote}}: ({{ $sso.idp | quote }}, {{ $sso.protocol\
        \ | quote }}),\n  {{- end }}\n}\n\n{{- end }}\n\n# Disable SSL certificate\
        \ checks (useful for self-signed certificates):\nOPENSTACK_SSL_NO_VERIFY =\
        \ {{ .Values.conf.horizon.local_settings.config.ssl_no_verify }}\n\n{{- if\
        \ .Values.manifests.certificates }}\n# The CA certificate to use to verify\
        \ SSL connections\nOPENSTACK_SSL_CACERT = '/etc/openstack-dashboard/certs/ca.crt'\n\
        {{- end }}\n\n# The OPENSTACK_KEYSTONE_BACKEND settings can be used to identify\
        \ the\n# capabilities of the auth backend for Keystone.\n# If Keystone has\
        \ been configured to use LDAP as the auth backend then set\n# can_edit_user\
        \ to False and name to 'ldap'.\n#\n# TODO(tres): Remove these once Keystone\
        \ has an API to identify auth backend.\nOPENSTACK_KEYSTONE_BACKEND = {\n \
        \   'name': 'native',\n    'can_edit_user': True,\n    'can_edit_group': True,\n\
        \    'can_edit_project': True,\n    'can_edit_domain': True,\n    'can_edit_role':\
        \ True,\n}\n\n# Setting this to True, will add a new \"Retrieve Password\"\
        \ action on instance,\n# allowing Admin session password retrieval/decryption.\n\
        OPENSTACK_ENABLE_PASSWORD_RETRIEVE = {{ .Values.conf.horizon.local_settings.config.openstack_enable_password_retrieve\
        \ }}\n# Controls whether the keystone openrc file is accessible from the user\
        \ menu and the api access panel.\nSHOW_OPENRC_FILE = {{ .Values.conf.horizon.local_settings.config.show_openrc_file\
        \ }}\n# The Launch Instance user experience has been significantly enhanced.\n\
        # You can choose whether to enable the new launch instance experience,\n#\
        \ the legacy experience, or both. The legacy experience will be removed\n\
        # in a future release, but is available as a temporary backup setting to ensure\n\
        # compatibility with existing deployments. Further development will not be\n\
        # done on the legacy experience. Please report any problems with the new\n\
        # experience via the StoryBoard tracking system.\n#\n# Toggle LAUNCH_INSTANCE_LEGACY_ENABLED\
        \ and LAUNCH_INSTANCE_NG_ENABLED to\n# determine the experience to enable.\
        \  Set them both to true to enable\n# both.\n#LAUNCH_INSTANCE_LEGACY_ENABLED\
        \ = True\n#LAUNCH_INSTANCE_NG_ENABLED = False\n\n# The Xen Hypervisor has\
        \ the ability to set the mount point for volumes\n# attached to instances\
        \ (other Hypervisors currently do not). Setting\n# can_set_mount_point to\
        \ True will add the option to set the mount point\n# from the UI.\nOPENSTACK_HYPERVISOR_FEATURES\
        \ = {\n    'can_set_mount_point': False,\n    'can_set_password': False,\n\
        }\n\n# The OPENSTACK_CINDER_FEATURES settings can be used to enable optional\n\
        # services provided by cinder that is not exposed by its extension API.\n\
        OPENSTACK_CINDER_FEATURES = {\n    'enable_backup': {{ .Values.conf.horizon.local_settings.config.openstack_cinder_features.enable_backup\
        \ }},\n}\n\n# The OPENSTACK_NEUTRON_NETWORK settings can be used to enable\
        \ optional\n# services provided by neutron. Options currently available are\
        \ load\n# balancer service, security groups, quotas, VPN service.\nOPENSTACK_NEUTRON_NETWORK\
        \ = {\n    'enable_router': {{ .Values.conf.horizon.local_settings.config.openstack_neutron_network.enable_router\
        \ }},\n    'enable_quotas': {{ .Values.conf.horizon.local_settings.config.openstack_neutron_network.enable_quotas\
        \ }},\n    'enable_ipv6': {{ .Values.conf.horizon.local_settings.config.openstack_neutron_network.enable_ipv6\
        \ }},\n    'enable_distributed_router': {{ .Values.conf.horizon.local_settings.config.openstack_neutron_network.enable_distributed_router\
        \ }},\n    'enable_ha_router': {{ .Values.conf.horizon.local_settings.config.openstack_neutron_network.enable_ha_router\
        \ }},\n    'enable_lb': {{ .Values.conf.horizon.local_settings.config.openstack_neutron_network.enable_lb\
        \ }},\n    'enable_firewall': {{ .Values.conf.horizon.local_settings.config.openstack_neutron_network.enable_firewall\
        \ }},\n    'enable_vpn': {{ .Values.conf.horizon.local_settings.config.openstack_neutron_network.enable_vpn\
        \ }},\n    'enable_fip_topology_check': {{ .Values.conf.horizon.local_settings.config.openstack_neutron_network.enable_fip_topology_check\
        \ }},\n\n    # The profile_support option is used to detect if an external\
        \ router can be\n    # configured via the dashboard. When using specific plugins\
        \ the\n    # profile_support can be turned on if needed.\n    'profile_support':\
        \ None,\n    #'profile_support': 'cisco',\n\n    # Set which provider network\
        \ types are supported. Only the network types\n    # in this list will be\
        \ available to choose from when creating a network.\n    # Network types include\
        \ local, flat, vlan, gre, and vxlan.\n    'supported_provider_types': ['*'],\n\
        \n    # Set which VNIC types are supported for port binding. Only the VNIC\n\
        \    # types in this list will be available to choose from when creating a\n\
        \    # port.\n    # VNIC types include 'normal', 'macvtap' and 'direct'.\n\
        \    'supported_vnic_types': ['*']\n}\n\n# The OPENSTACK_IMAGE_BACKEND settings\
        \ can be used to customize features\n# in the OpenStack Dashboard related\
        \ to the Image service, such as the list\n# of supported image formats.\n\
        #OPENSTACK_IMAGE_BACKEND = {\n#    'image_formats': [\n#        ('', _('Select\
        \ format')),\n#        ('aki', _('AKI - Amazon Kernel Image')),\n#       \
        \ ('ami', _('AMI - Amazon Machine Image')),\n#        ('ari', _('ARI - Amazon\
        \ Ramdisk Image')),\n#        ('docker', _('Docker')),\n#        ('iso', _('ISO\
        \ - Optical Disk Image')),\n#        ('ova', _('OVA - Open Virtual Appliance')),\n\
        #        ('qcow2', _('QCOW2 - QEMU Emulator')),\n#        ('raw', _('Raw')),\n\
        #        ('vdi', _('VDI - Virtual Disk Image')),\n#        ('vhd', ('VHD -\
        \ Virtual Hard Disk')),\n#        ('vmdk', _('VMDK - Virtual Machine Disk')),\n\
        #    ]\n#}\n\n# The IMAGE_CUSTOM_PROPERTY_TITLES settings is used to customize\
        \ the titles for\n# image custom property attributes that appear on image\
        \ detail pages.\nIMAGE_CUSTOM_PROPERTY_TITLES = {\n    \"architecture\": _(\"\
        Architecture\"),\n    \"kernel_id\": _(\"Kernel ID\"),\n    \"ramdisk_id\"\
        : _(\"Ramdisk ID\"),\n    \"image_state\": _(\"Euca2ools state\"),\n    \"\
        project_id\": _(\"Project ID\"),\n    \"image_type\": _(\"Image Type\"),\n\
        }\n\n# The IMAGE_RESERVED_CUSTOM_PROPERTIES setting is used to specify which\
        \ image\n# custom properties should not be displayed in the Image Custom Properties\n\
        # table.\nIMAGE_RESERVED_CUSTOM_PROPERTIES = []\n\n# Set to 'legacy' or 'direct'\
        \ to allow users to upload images to glance via\n# Horizon server. When enabled,\
        \ a file form field will appear on the create\n# image form. If set to 'off',\
        \ there will be no file form field on the create\n# image form. See documentation\
        \ for deployment considerations.\nHORIZON_IMAGES_UPLOAD_MODE = '{{ .Values.conf.horizon.local_settings.config.horizon_images_upload_mode\
        \ }}'\n\n# OPENSTACK_ENDPOINT_TYPE specifies the endpoint type to use for\
        \ the endpoints\n# in the Keystone service catalog. Use this setting when\
        \ Horizon is running\n# external to the OpenStack environment. The default\
        \ is 'publicURL'.\nOPENSTACK_ENDPOINT_TYPE = \"{{ .Values.conf.horizon.local_settings.config.endpoint_type\
        \ }}\"\n\n# SECONDARY_ENDPOINT_TYPE specifies the fallback endpoint type to\
        \ use in the\n# case that OPENSTACK_ENDPOINT_TYPE is not present in the endpoints\n\
        # in the Keystone service catalog. Use this setting when Horizon is running\n\
        # external to the OpenStack environment. The default is None.  This\n# value\
        \ should differ from OPENSTACK_ENDPOINT_TYPE if used.\nSECONDARY_ENDPOINT_TYPE\
