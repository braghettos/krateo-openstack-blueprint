      \ ~ /^s_rally_/ { print $1 }')\nif [ -n \"$SERVERS\" ]; then\n  echo $SERVERS\
      \ | xargs openstack server delete\nfi\nIMAGES=$(openstack image list -f value\
      \ | awk '$2 ~ /^c_rally_/ { print $1 }')\nif [ -n \"$IMAGES\" ]; then\n  echo\
