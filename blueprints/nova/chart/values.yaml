bootstrap:
  enabled: true
  ks_user: admin
  script: null
  structured:
    flavors:
      enabled: true
      options:
        m1_large:
          disk: 80
          name: m1.large
          ram: 8192
          vcpus: 4
        m1_medium:
          disk: 40
          name: m1.medium
          ram: 4096
          vcpus: 2
        m1_small:
          disk: 20
          name: m1.small
          ram: 2048
          vcpus: 1
        m1_tiny:
          disk: 1
          name: m1.tiny
          ram: 512
          vcpus: 1
        m1_xlarge:
          disk: 160
          name: m1.xlarge
          ram: 16384
          vcpus: 8
  wait_for_computes:
    enabled: true
    remaining_wait: 300
    scripts:
      init_script: '# This runs in a bootstrap init container. It counts the number
        of compute nodes.

        COMPUTE_NODES=$(kubectl get nodes -o custom-columns=NAME:.metadata.name -l
        openstack-compute-node=enabled --no-headers | sort)

        /bin/echo $COMPUTE_NODES > /tmp/compute_nodes.txt

        '
      wait_script: "# This script runs in the main bootstrap container just before\
        \ the\n# bootstrap.script is called.\nCOMPUTE_HOSTS=`cat /tmp/compute_nodes.txt\
        \ | wc -w`\nif [[ $COMPUTE_HOSTS == 0 ]]; then\n  echo \"There are no compute\
        \ hosts found!\"\n  exit 1\nfi\n\n# Wait for all hypervisors to come up before\
        \ moving on with the deployment\nHYPERVISOR_WAIT=true\nWAIT_AFTER_READY=0\n\
        SLEEP=5\nwhile [[ $HYPERVISOR_WAIT == true ]]; do\n  date '+%Y-%m-%d %H:%M:%S.%3N'\n\
        \  # Its possible that openstack command may fail due to not being able to\n\
        \  # reach the compute service\n  set +e\n  HYPERVISORS=$(openstack hypervisor\
        \ list -f value -c 'Hypervisor Hostname' | wc -w)\n  set -e\n\n  PERCENT_READY=$((\
        \ $HYPERVISORS * 100 / $COMPUTE_HOSTS ))\n  if [[ $PERCENT_READY -ge $WAIT_PERCENTAGE\
        \ ]]; then\n    echo \"Hypervisor ready percentage is $PERCENT_READY\"\n \
        \   if [[ $PERCENT_READY == 100 ]]; then\n      HYPERVISOR_WAIT=false\n  \
        \    echo \"All hypervisors are ready.\"\n    elif [[ $WAIT_AFTER_READY -ge\
        \ $REMAINING_WAIT ]]; then\n      HYPERVISOR_WAIT=false\n      echo \"Waited\
        \ the configured time -- $HYPERVISORS out of $COMPUTE_HOSTS hypervisor(s)\
        \ ready -- proceeding with the bootstrap.\"\n    else\n      sleep $SLEEP\n\
        \      WAIT_AFTER_READY=$(( $WAIT_AFTER_READY + $SLEEP ))\n    fi\n  else\n\
        \    echo \"Waiting $SLEEP seconds for enough hypervisors to be discovered...\"\
        \n    sleep $SLEEP\n  fi\ndone\n"
    wait_percentage: 70
ceph_client:
  configmap: ceph-etc
  user_secret_name: pvc-ceph-client-key
