{{- /* Step 2: emit each Composition only when its CRD exists and all its
       dependency Compositions report Ready=True (Helm lookup, re-evaluated each
       reconcile). On the first pass only zero-dependency components render; later
       passes unlock the rest in order. */ -}}
{{- $sel := splitList " " (include "osh.selected" (list $)) }}
{{- range $c := .Values.components }}
{{- if has $c.name $sel }}
{{- $crd := include "osh.crdExists" (list $c.kind) }}
{{- $deps := include "osh.depsReady" (list $ $c.deps $.Values.components) }}
{{- if and (eq $crd "true") (eq $deps "true") }}
---
apiVersion: {{ include "osh.apiVersion" (list $) }}
kind: {{ $c.kind }}
metadata:
  name: {{ $c.name }}
  namespace: {{ $.Release.Namespace }}
spec: {}
{{- end }}
{{- end }}
{{- end }}
