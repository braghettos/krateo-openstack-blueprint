{{- /*
Each serviceContract capability renders one ClusterRole:
  - labeled krateo.io/capability=true so a role composer can list it
  - labeled rbac.krateo.io/aggregate-to-<role>=true so predefined roles
    (built with aggregationRule) absorb it automatically on install
  - annotated with title / enforcement layer / required ACR for the catalog
*/ -}}
{{- range .Values.serviceContract.capabilities }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ printf "%s-%s" $.Values.serviceContract.service.name .name }}
  labels:
    krateo.io/capability: "true"
    app.kubernetes.io/name: {{ $.Values.serviceContract.service.name }}
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
    {{- range .aggregateTo }}
    rbac.krateo.io/aggregate-to-{{ . }}: "true"
    {{- end }}
  annotations:
    krateo.io/title: {{ .title | quote }}
    krateo.io/enforcement: {{ .enforcement | quote }}
    {{- with .description }}
    krateo.io/description: {{ . | quote }}
    {{- end }}
    {{- with .requiresAcr }}
    krateo.io/requires-acr: {{ . | quote }}
    {{- end }}
    {{- with .crossOrgRole }}
    krateo.io/cross-org-role: {{ . | quote }}
    {{- end }}
rules:
  {{- toYaml .rules | nindent 2 }}
{{- end }}
