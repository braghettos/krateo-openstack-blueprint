{{- /* Step 1: register each selected component's CompositionDefinition. */ -}}
{{- $sel := splitList " " (include "osh.selected" (list $)) }}
{{- if .Values.installDefinitions }}
{{- range $c := .Values.components }}
{{- if has $c.name $sel }}
---
apiVersion: core.krateo.io/v1alpha1
kind: CompositionDefinition
metadata:
  name: {{ $c.name }}
  namespace: {{ $.Release.Namespace }}
spec:
  chart:
    url: {{ $.Values.ociRepo }}/{{ $c.name }}
    version: {{ $.Values.chartVersion | quote }}
{{- end }}
{{- end }}
{{- end }}
