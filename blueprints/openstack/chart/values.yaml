# Orchestrator configuration.
# ociRepo: where the per-component blueprint charts are published.
ociRepo: oci://ghcr.io/braghettos/charts
chartVersion: "0.1.1"
# installDefinitions: also register the component CompositionDefinitions.
installDefinitions: true
# profile: "identity" (mariadb,memcached,keystone,glance,horizon) or "full" (adds compute).
profile: identity

# The component DAG. `deps` are component names whose Compositions must be Ready
# before this one's Composition is emitted. `tier`: identity or compute. (CRD existence is matched by Kind, so no plural needed.)
components:
  - {name: mariadb,     kind: Mariadb,     deps: [],                                          tier: identity}
  - {name: memcached,   kind: Memcached,   deps: [],                                          tier: identity}
  - {name: keystone,    kind: Keystone,    deps: [mariadb, memcached],                        tier: identity}
  - {name: glance,      kind: Glance,      deps: [keystone],                                  tier: identity}
  - {name: horizon,     kind: Horizon,     deps: [keystone],                                  tier: identity}
  - {name: rabbitmq,    kind: Rabbitmq,    deps: [],                                          tier: compute}
  - {name: openvswitch, kind: Openvswitch, deps: [],                                          tier: compute}
  - {name: placement,   kind: Placement,   deps: [keystone],                                  tier: compute}
  - {name: libvirt,     kind: Libvirt,     deps: [openvswitch],                               tier: compute}
  - {name: neutron,     kind: Neutron,     deps: [keystone, rabbitmq, openvswitch],           tier: compute}
  - {name: nova,        kind: Nova,        deps: [keystone, placement, rabbitmq, glance, neutron, libvirt], tier: compute}
