apiVersion: core.krateo.io/v1alpha1
kind: CompositionDefinition
metadata:
  name: openstack
  namespace: openstack-system
spec:
  chart:
    # OCI artifact published by .github/workflows/release-tag.yaml.
    # The chart name (openstack-installer) is appended to the OCI repository path.
    url: oci://ghcr.io/braghettos/charts/openstack-installer
    version: "0.1.0"
    # If the GHCR package is private, provide pull credentials:
    # credentials:
    #   username: braghettos
    #   passwordRef:
    #     key: token
    #     name: ghcr-credentials
    #     namespace: openstack-system
