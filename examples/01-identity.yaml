# OpenStack identity plane — one Composition per component, all in namespace 'openstack'.
# They self-order via OpenStack-Helm's kubernetes-entrypoint dep-checks.
# Apply: kubectl create ns openstack && kubectl apply -f examples/01-identity.yaml
---
apiVersion: composition.krateo.io/v0-1-0
kind: Mariadb
metadata:
  name: mariadb
  namespace: openstack
spec: {}
---
apiVersion: composition.krateo.io/v0-1-0
kind: Memcached
metadata:
  name: memcached
  namespace: openstack
spec: {}
---
apiVersion: composition.krateo.io/v0-1-0
kind: Keystone
metadata:
  name: keystone
  namespace: openstack
spec: {}
---
apiVersion: composition.krateo.io/v0-1-0
kind: Glance
metadata:
  name: glance
  namespace: openstack
spec: {}
---
apiVersion: composition.krateo.io/v0-1-0
kind: Horizon
metadata:
  name: horizon
  namespace: openstack
spec: {}
