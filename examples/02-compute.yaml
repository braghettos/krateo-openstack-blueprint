# OpenStack compute plane — adds the message bus + compute/networking components.
# Requires the identity tier (01-identity.yaml) in the same namespace, plus an
# amd64 cluster with the Open vSwitch kernel module (e.g. Ubuntu GKE nodes), node
# labels (openstack-compute-node/openvswitch/l3-agent=enabled) and neutron.network.
# interface.tunnel set to the host NIC. See quickstart-gke.md.
---
apiVersion: composition.krateo.io/v0-1-0
kind: OpenstackRabbitmq
metadata:
  name: openstack-rabbitmq
  namespace: openstack
spec: {}
---
apiVersion: composition.krateo.io/v0-1-0
kind: OpenstackPlacement
metadata:
  name: openstack-placement
  namespace: openstack
spec: {}
---
apiVersion: composition.krateo.io/v0-1-0
kind: OpenstackOpenvswitch
metadata:
  name: openstack-openvswitch
  namespace: openstack
spec: {}
---
apiVersion: composition.krateo.io/v0-1-0
kind: OpenstackLibvirt
metadata:
  name: openstack-libvirt
  namespace: openstack
spec: {}
---
apiVersion: composition.krateo.io/v0-1-0
kind: OpenstackNova
metadata:
  name: openstack-nova
  namespace: openstack
spec: {}
---
apiVersion: composition.krateo.io/v0-1-0
kind: OpenstackNeutron
metadata:
  name: openstack-neutron
  namespace: openstack
spec: {}
