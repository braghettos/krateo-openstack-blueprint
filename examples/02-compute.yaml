# OpenStack compute plane. Requires the identity tier in the same namespace, plus an
# amd64 cluster with the Open vSwitch kernel module (e.g. Ubuntu GKE nodes) and node
# labels (openstack-compute-node/openvswitch/l3-agent=enabled). See quickstart-gke.md.
---
apiVersion: composition.krateo.io/v0-1-1
kind: Rabbitmq
metadata:
  name: rabbitmq
  namespace: openstack
spec: {}
---
apiVersion: composition.krateo.io/v0-1-1
kind: Placement
metadata:
  name: placement
  namespace: openstack
spec: {}
---
apiVersion: composition.krateo.io/v0-1-1
kind: Openvswitch
metadata:
  name: openvswitch
  namespace: openstack
spec: {}
---
apiVersion: composition.krateo.io/v0-1-1
kind: Libvirt
metadata:
  name: libvirt
  namespace: openstack
spec: {}
---
apiVersion: composition.krateo.io/v0-1-1
kind: Neutron
metadata:
  name: neutron
  namespace: openstack
spec: {}
---
apiVersion: composition.krateo.io/v0-1-1
kind: Nova
metadata:
  name: nova
  namespace: openstack
spec: {}
---
# Bare-metal provisioning. Production-grade (ipmi/redfish, iPXE/TFTP/HTTP, conductor on
# hostNetwork). The conductor needs a node on the provisioning network with the PXE NIC
# (default ironic-pxe) labelled openstack-control-plane=enabled; without real hardware the
# api + Keystone registration come up but the conductor/provisioning path needs real infra.
apiVersion: composition.krateo.io/v0-1-1
kind: Ironic
metadata:
  name: ironic
  namespace: openstack
spec: {}
---
# Block storage. Requires a volume backend (LVM/Ceph/NFS) on the nodes; the API +
# scheduler + Keystone registration come up without one, but volume create needs
# real storage. Backup (object store) is disabled by default.
apiVersion: composition.krateo.io/v0-1-1
kind: Cinder
metadata:
  name: cinder
  namespace: openstack
spec: {}
---
# Orchestration (stacks). Two services (orchestration + cloudformation). Its jobs
# bootstrap a stack domain + heat_domain_admin in Keystone; no extra infra needed.
apiVersion: composition.krateo.io/v0-1-1
kind: Heat
metadata:
  name: heat
  namespace: openstack
spec: {}
---
# Key manager (secrets/certificates store). The simple_crypto KEK defaults to a
# well-known value - override conf.barbican.simple_crypto_plugin.kek for production
# (it must never change once secrets are stored, or they become undecryptable).
apiVersion: composition.krateo.io/v0-1-1
kind: Barbican
metadata:
  name: barbican
  namespace: openstack
spec: {}
