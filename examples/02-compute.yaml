# OpenStack compute plane. Requires the identity tier in the same namespace, plus an
# amd64 cluster with the Open vSwitch kernel module (e.g. Ubuntu GKE nodes) and node
# labels (openstack-compute-node/openvswitch/l3-agent=enabled). See quickstart-gke.md.
---
apiVersion: composition.krateo.io/v0-1-1
kind: Rabbitmq
metadata:
  name: rabbitmq
  namespace: openstack
spec: {}
---
apiVersion: composition.krateo.io/v0-1-1
kind: Placement
metadata:
  name: placement
  namespace: openstack
spec: {}
---
apiVersion: composition.krateo.io/v0-1-1
kind: Openvswitch
metadata:
  name: openvswitch
  namespace: openstack
spec: {}
---
apiVersion: composition.krateo.io/v0-1-1
kind: Libvirt
metadata:
  name: libvirt
  namespace: openstack
spec: {}
---
apiVersion: composition.krateo.io/v0-1-1
kind: Neutron
metadata:
  name: neutron
  namespace: openstack
spec: {}
---
apiVersion: composition.krateo.io/v0-1-1
kind: Nova
metadata:
  name: nova
  namespace: openstack
spec: {}
---
# Orchestration (stacks). Two services (orchestration + cloudformation). Its jobs
# bootstrap a stack domain + heat_domain_admin in Keystone; no extra infra needed.
apiVersion: composition.krateo.io/v0-1-1
kind: Heat
metadata:
  name: heat
  namespace: openstack
spec: {}
