# One OpenstackInstaller Composition = one OpenStack installation.
# Apply into its OWN namespace (OpenStack-Helm uses fixed service names, so only
# one OpenStack install can live per namespace).
#
#   kubectl create namespace openstack
#   kubectl apply -f examples/composition.yaml
#
# With an empty/minimal spec you get the default identity control plane
# (MariaDB + Memcached + Keystone). Uncomment fields to customise or to add the
# optional Glance / Horizon components.
apiVersion: composition.krateo.io/v0-1-0
kind: OpenstackInstaller
metadata:
  name: openstack
  namespace: openstack
spec:
  keystone:
    pod:
      replicas:
        api: 1
  # glance:
  #   enabled: true
  # horizon:
  #   enabled: true
  #   network:
  #     node_port:
  #       port: 31000
  # rabbitmq:            # leave OFF on Apple-Silicon kind (Erlang fails under emulation)
  #   enabled: true
