# The ENTIRE operator-facing input surface for the identity tier (the globals.yml analog).
# Compare against the ~40-key endpoints tree this generates per service: see README.
global:
  # OSH-native analog of kolla_internal_vip_address: services resolve as
  # <short-name>.<namespace>.svc.<clusterDomain>. The operator sets namespace +
  # protocol + region + a port per service; the rest is derived.
  namespace: openstack
  clusterDomain: cluster.local
  region: RegionOne
  protocol:
    internal: http
    public: http
  # one port per service - everything else (hosts, scheme, paths, fqdn override,
  # auth wiring) is generated by the osh-derive helpers.
  endpoints:
    identity:
      port: 5000
    oslo_db:
      port: 3306
    oslo_cache:
      port: 11211
    oslo_messaging:
      port: 5672
  # secret strategy - the kolla-genpwd analog.
  #   generate: lookup the kept Secret and reuse each value; generate only missing keys.
  #   provided: take values from global.passwords.provided (deterministic for CI/dry-run).
  passwords:
    mode: generate
    length: 32
