{{/*
Generate-once credentials - the kolla-genpwd analog.

  mode generate (default): lookup the existing kept Secret; reuse every key that already
    exists, generate only the missing ones. With resource-policy keep the Secret survives
    helm uninstall, so values are created once and reused forever (kolla's "only fill None").
  mode provided: take values from global.passwords.provided - byte-deterministic for CI,
    since lookup returns empty during `helm template`/dry-run.
*/}}
{{- $ns := .Release.Namespace -}}
{{- $p := .Values.global.passwords | default dict -}}
{{- $mode := $p.mode | default "generate" -}}
{{- $provided := $p.provided | default dict -}}
{{- $len := $p.length | default 32 | int -}}
{{- $existing := dict -}}
{{- if eq $mode "generate" -}}
{{-   $existing = (lookup "v1" "Secret" $ns "identity-passwords") | default dict -}}
{{- end -}}
{{- $existingData := (get $existing "data") | default dict -}}
{{- $keys := list "keystone_admin" "keystone_db" "mariadb_root" "memcache_secret_key" "rabbitmq" -}}
apiVersion: v1
kind: Secret
metadata:
  name: identity-passwords
  namespace: {{ $ns }}
  annotations:
    # Never garbage-collected: created once, reused across upgrades/reconciles.
    helm.sh/resource-policy: keep
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    osh-derive/passwords-mode: {{ $mode }}
type: Opaque
data:
{{- range $k := $keys }}
  {{- if eq $mode "provided" }}
  {{ $k }}: {{ get $provided $k | default "" | b64enc }}
  {{- else }}
  {{- $cur := get $existingData $k }}
  {{ $k }}: {{ $cur | default (randAlphaNum $len | b64enc) }}
  {{- end }}
{{- end }}
