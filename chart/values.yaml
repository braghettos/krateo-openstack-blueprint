# Default values for openstack-installer.
#
# This umbrella wires the upstream OpenStack-Helm subcharts into a single,
# working "identity control plane" install. The values here are the validated
# defaults; a Composition only needs to override the small curated set declared
# in values.schema.json (everything else falls back to these defaults).
#
# OpenStack-Helm services use FIXED, non-release-prefixed resource names derived
# from their `endpoints` config (e.g. Services `mariadb`, `memcached`,
# `keystone-api`), so the subcharts interconnect correctly inside one release.
#
# All images are pinned to the 2025.1 "Epoxy" ubuntu_jammy tags and pulled with
# IfNotPresent so a pre-loaded image (required on Apple-Silicon kind, see
# tools/kind-load-images.sh) is used instead of being re-pulled.

# ---------------------------------------------------------------------------
# MariaDB — the OpenStack relational datastore (always deployed).
# ---------------------------------------------------------------------------
mariadb:
  images:
    pull_policy: IfNotPresent
    tags:
      prometheus_mysql_exporter_helm_tests: quay.io/airshipit/openstack-client:2025.1-ubuntu_jammy
      ks_user: quay.io/airshipit/openstack-client:2025.1-ubuntu_jammy
  pod:
    replicas:
      server: 1
  # Single-node, no Galera clustering, use the cluster default StorageClass
  # (kind ships rancher.io/local-path as `standard`).
  volume:
    enabled: false
    use_local_path_for_single_pod_cluster:
      enabled: true
  monitoring:
    prometheus:
      enabled: false
  # The per-chart helm-test pod creates a Release-named ServiceAccount/Role
  # ("<release>-test") that collides with the other subcharts in this umbrella.
  # Disable it (helm-test scaffolding is not needed to run the install).
  manifests:
    pod_test: false

# ---------------------------------------------------------------------------
# Memcached — Keystone token/catalog cache (always deployed).
# ---------------------------------------------------------------------------
memcached:
  images:
    pull_policy: IfNotPresent

# ---------------------------------------------------------------------------
# Keystone — the OpenStack Identity service (always deployed). This is the
# component that makes the install "functional": it issues Fernet tokens and
# owns the service catalog.
# ---------------------------------------------------------------------------
keystone:
  images:
    pull_policy: IfNotPresent
    tags:
      bootstrap: quay.io/airshipit/openstack-client:2025.1-ubuntu_jammy
      db_init: quay.io/airshipit/openstack-client:2025.1-ubuntu_jammy
      db_drop: quay.io/airshipit/openstack-client:2025.1-ubuntu_jammy
      keystone_api: quay.io/airshipit/keystone:2025.1-ubuntu_jammy
      keystone_bootstrap: quay.io/airshipit/openstack-client:2025.1-ubuntu_jammy
      keystone_credential_rotate: quay.io/airshipit/keystone:2025.1-ubuntu_jammy
      keystone_credential_setup: quay.io/airshipit/keystone:2025.1-ubuntu_jammy
      keystone_credential_cleanup: quay.io/airshipit/openstack-client:2025.1-ubuntu_jammy
      keystone_db_sync: quay.io/airshipit/keystone:2025.1-ubuntu_jammy
      keystone_domain_manage: quay.io/airshipit/keystone:2025.1-ubuntu_jammy
      keystone_fernet_rotate: quay.io/airshipit/keystone:2025.1-ubuntu_jammy
      keystone_fernet_setup: quay.io/airshipit/keystone:2025.1-ubuntu_jammy
      ks_user: quay.io/airshipit/openstack-client:2025.1-ubuntu_jammy
  pod:
    replicas:
      api: 1
  # RabbitMQ (Erlang) does not run under the qemu emulation kind uses on
  # Apple Silicon, and Keystone's identity API does not need it — only
  # notifications do. Drop the rabbit-init job/secret and send notifications to
  # the noop driver so Keystone comes up without a message bus. Set
  # rabbitmq.enabled=true (below) to deploy RabbitMQ and turn these back on.
  manifests:
    job_rabbit_init: false
    secret_rabbitmq: false
    # Avoid the Release-named test RBAC colliding across the umbrella subcharts.
    pod_rally_test: false
    # image-repo-sync needs a local docker registry we do not run; the pre-delete
    # credential-cleanup hook needs job DELETE rights the Krateo dynamic
    # controller's least-privilege ServiceAccount does not have. Both are
    # unnecessary for a working install.
    job_image_repo_sync: false
    job_credential_cleanup: false
  conf:
    keystone:
      oslo_messaging_notifications:
        driver: noop

# ---------------------------------------------------------------------------
# RabbitMQ — OpenStack message bus. OPTIONAL, OFF by default. Required only for
# notifications and for multi-service installs (Glance/Horizon do not need it).
# Note: the Erlang VM crashes under qemu emulation, so leave this OFF on
# Apple-Silicon kind; enable it on a native amd64 cluster.
# ---------------------------------------------------------------------------
rabbitmq:
  enabled: false
  images:
    pull_policy: IfNotPresent
    tags:
      rabbitmq_init: quay.io/airshipit/openstack-client:2025.1-ubuntu_jammy
      prometheus_rabbitmq_exporter_helm_tests: quay.io/airshipit/openstack-client:2025.1-ubuntu_jammy
  pod:
    replicas:
      server: 1
  volume:
    enabled: false
    use_local_path:
      enabled: true
  manifests:
    pod_test: false

# ---------------------------------------------------------------------------
# Glance — OpenStack Image service. OPTIONAL, OFF by default. Stores image
# metadata/records in MariaDB and image data on a PVC (no Ceph on kind).
# ---------------------------------------------------------------------------
glance:
  enabled: false
  images:
    pull_policy: IfNotPresent
    tags:
      bootstrap: quay.io/airshipit/openstack-client:2025.1-ubuntu_jammy
      db_init: quay.io/airshipit/openstack-client:2025.1-ubuntu_jammy
      db_drop: quay.io/airshipit/openstack-client:2025.1-ubuntu_jammy
      glance_api: quay.io/airshipit/glance:2025.1-ubuntu_jammy
      glance_db_sync: quay.io/airshipit/glance:2025.1-ubuntu_jammy
      glance_storage_init: quay.io/airshipit/glance:2025.1-ubuntu_jammy
      glance_metadefs_load: quay.io/airshipit/glance:2025.1-ubuntu_jammy
      ks_user: quay.io/airshipit/openstack-client:2025.1-ubuntu_jammy
      ks_service: quay.io/airshipit/openstack-client:2025.1-ubuntu_jammy
      ks_endpoints: quay.io/airshipit/openstack-client:2025.1-ubuntu_jammy
  pod:
    replicas:
      api: 1
  # Filesystem (PVC) image store instead of Ceph/Swift.
  storage: pvc
  volume:
    class_name: standard
    size: 2Gi
  # Glance does not need its own message bus for a basic image store.
  manifests:
    job_rabbit_init: false
    pod_rally_test: false
  conf:
    glance:
      oslo_messaging_notifications:
        driver: noop

# ---------------------------------------------------------------------------
# Horizon — OpenStack Dashboard (web UI). OPTIONAL, OFF by default. When enabled
# it is exposed on a NodePort so it is reachable from the host on kind.
# ---------------------------------------------------------------------------
horizon:
  enabled: false
  images:
    pull_policy: IfNotPresent
    tags:
      horizon: quay.io/airshipit/horizon:2025.1-ubuntu_jammy
      horizon_db_sync: quay.io/airshipit/horizon:2025.1-ubuntu_jammy
      db_init: quay.io/airshipit/openstack-client:2025.1-ubuntu_jammy
      db_drop: quay.io/airshipit/openstack-client:2025.1-ubuntu_jammy
  pod:
    replicas:
      server: 1
  network:
    node_port:
      enabled: true
      port: 31000
  manifests:
    job_db_init_endpoint: false
    pod_helm_test: false
  conf:
    horizon:
      local_settings:
        config:
          openstack_keystone_default_role: member
