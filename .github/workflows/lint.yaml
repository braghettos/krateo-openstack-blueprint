name: lint

on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Umbrella componentValues schema is in sync with the component schemas
        run: |
          python3 -m pip install --quiet pyyaml
          python3 hack/gen-componentvalues-schema.py
          if ! git diff --quiet blueprints/openstack/chart/values.schema.json; then
            echo "::error::umbrella values.schema.json is stale - run hack/gen-componentvalues-schema.py and commit the result"
            git --no-pager diff blueprints/openstack/chart/values.schema.json | head -50
            exit 1
          fi

      - name: Lint, render, determinism + hook-free gate for every blueprint chart
        run: |
          fail=0
          for d in blueprints/*/chart; do
            echo "== $d =="
            sed -i "s/CHART_VERSION/0.0.0-ci/g" "$d/Chart.yaml"
            helm lint "$d"
            # render twice and compare - any randAlphaNum/uuidv4/now reaching a manifest
            # makes the two renders differ (the reconcile-churn class of bug, e.g. gnocchi
            # statsd UUIDs, memcache_secret_key). Must be byte-identical.
            helm template release "$d" --namespace openstack > /tmp/r1.yaml
            helm template release "$d" --namespace openstack > /tmp/r2.yaml
            if ! diff -q /tmp/r1.yaml /tmp/r2.yaml > /dev/null; then
              echo "::error file=$d::NON-DETERMINISTIC - two renders differ (reconcile churn)"
              diff /tmp/r1.yaml /tmp/r2.yaml | head -30
              fail=1
            fi
            # Helm hooks must be stripped - the Krateo composition-dynamic-controller SA
            # cannot get/delete hook Jobs, so hooked charts never converge.
            if grep -q 'helm.sh/hook' /tmp/r1.yaml; then
              echo "::error file=$d::emits Helm hooks (must be stripped for the CDC ServiceAccount)"
              grep -n 'helm.sh/hook' /tmp/r1.yaml | head
              fail=1
            fi
          done
          # the umbrella orchestrator must render under the full profile
          helm template osh blueprints/openstack/chart --namespace openstack --set profile=full > /dev/null
          exit $fail
