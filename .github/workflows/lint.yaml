name: lint

on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint and render every blueprint chart
        run: |
          for d in blueprints/*/chart; do
            echo "== $d =="
            sed -i "s/CHART_VERSION/0.0.0-ci/g" "$d/Chart.yaml"
            helm lint "$d"
            helm template release "$d" --namespace openstack > /dev/null
          done
