name: release-tag

# Packages every per-component blueprint chart under blueprints/*/chart and
# publishes each to the GitHub Container Registry as an OCI Helm artifact on every
# semver tag.
#
# Pushing tag "0.1.0" publishes, for each component:
#   oci://ghcr.io/<owner>/charts/openstack-<component>:0.1.0
on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: read
  packages: write

jobs:
  package-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Resolve version and registry
        run: |
          echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "OCI_REPO=oci://ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/charts" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Package and push each blueprint chart
        run: |
          for d in blueprints/*/chart; do
            sed -i "s/CHART_VERSION/${VERSION}/g" "$d/Chart.yaml"
            name=$(grep -E '^name:' "$d/Chart.yaml" | awk '{print $2}')
            helm package "$d" --destination .
            helm push "${name}-${VERSION}.tgz" "${OCI_REPO}"
            echo "Published ${OCI_REPO}/${name}:${VERSION}"
          done
